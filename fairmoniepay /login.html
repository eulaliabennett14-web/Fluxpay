<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FairMonie Pay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a1f0a;
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ========== INITIAL LOADING SCREEN ========== */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a1f0a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        #loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-logo {
            width: 100px;
            height: 120px;
            position: relative;
            margin-bottom: 30px;
            animation: loader-pulse 2s ease-in-out infinite;
        }

        @keyframes loader-pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(34, 197, 94, 0.3)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 40px rgba(34, 197, 94, 0.6)); }
        }

        .loader-logo svg {
            width: 100%;
            height: 100%;
        }

        .spinner-container {
            position: relative;
            width: 50px;
            height: 50px;
            margin-bottom: 25px;
        }

        .spinner {
            width: 100%;
            height: 100%;
            border: 3px solid rgba(34, 197, 94, 0.15);
            border-top: 3px solid #22c55e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .spinner-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 32px;
            height: 32px;
            border: 3px solid rgba(74, 222, 128, 0.15);
            border-bottom: 3px solid #4ade80;
            border-radius: 50%;
            animation: spin 0.8s linear infinite reverse;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 16px;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            letter-spacing: 4px;
            animation: pulse-text 1.5s ease-in-out infinite;
        }

        .loading-text span {
            color: #22c55e;
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* ========== LOGIN LOADING OVERLAY ========== */
        #login-loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a1f0a;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        #login-loading-overlay.show {
            display: flex;
            animation: fadeInOverlay 0.4s ease-out;
        }

        @keyframes fadeInOverlay {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .login-spinner-container {
            position: relative;
            width: 60px;
            height: 60px;
            margin-bottom: 35px;
        }

        .login-spinner {
            width: 100%;
            height: 100%;
            border: 4px solid rgba(34, 197, 94, 0.12);
            border-top: 4px solid #22c55e;
            border-right: 4px solid #4ade80;
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
        }

        .login-spinner-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 38px;
            height: 38px;
            border: 3px solid rgba(74, 222, 128, 0.12);
            border-bottom: 3px solid #4ade80;
            border-left: 3px solid #22c55e;
            border-radius: 50%;
            animation: spin 0.9s linear infinite reverse;
        }

        .login-loading-text {
            font-size: 17px;
            font-weight: 600;
            color: rgba(255,255,255,0.85);
            text-align: center;
            max-width: 280px;
            line-height: 1.5;
            min-height: 52px;
            transition: opacity 0.4s ease;
        }

        .login-progress-bar {
            width: 200px;
            height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 3px;
            margin-top: 30px;
            overflow: hidden;
        }

        .login-progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #16a34a, #22c55e, #4ade80);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        /* ========== AURORA BACKGROUND ========== */
        .aurora-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .aurora-wave {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            opacity: 0.12;
            animation: aurora-rotate 20s linear infinite;
        }

        .aurora-wave:nth-child(1) {
            background: radial-gradient(ellipse at 30% 50%, rgba(34, 197, 94, 0.5) 0%, transparent 50%);
            animation-duration: 25s;
        }

        .aurora-wave:nth-child(2) {
            background: radial-gradient(ellipse at 70% 50%, rgba(74, 222, 128, 0.4) 0%, transparent 50%);
            animation-duration: 30s;
            animation-direction: reverse;
        }

        .aurora-wave:nth-child(3) {
            background: radial-gradient(ellipse at 50% 80%, rgba(34, 197, 94, 0.3) 0%, transparent 40%);
            animation-duration: 35s;
        }

        @keyframes aurora-rotate {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* ========== FLOATING PARTICLES CANVAS ========== */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* ========== MAIN CONTENT ========== */
        #main-content {
            display: none;
            position: relative;
            z-index: 2;
            min-height: 100vh;
            opacity: 0;
        }

        #main-content.show {
            display: block;
            animation: fadeInSlow 1.5s ease-out forwards;
        }

        @keyframes fadeInSlow {
            0% { opacity: 0; transform: translateY(30px); }
            30% { opacity: 0.3; transform: translateY(20px); }
            60% { opacity: 0.7; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ========== GLASSMORPHISM NAVBAR ========== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            position: sticky;
            top: 0;
            background: rgba(10, 31, 10, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo-icon {
            width: 38px;
            height: 38px;
            filter: drop-shadow(0 0 10px rgba(34, 197, 94, 0.4));
        }

        .header-brand {
            font-size: 20px;
            font-weight: 700;
            color: white;
            letter-spacing: -0.3px;
        }

        .header-brand span {
            color: #22c55e;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .login-btn-header {
            background: linear-gradient(145deg, #16a34a, #22c55e);
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 25px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }

        .login-btn-header:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
        }

        .signup-btn-header {
            background: transparent;
            border: 1.5px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.8);
            padding: 10px 24px;
            border-radius: 25px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .signup-btn-header:hover {
            border-color: rgba(255,255,255,0.3);
            color: white;
        }

        /* ========== LOGIN FORM SECTION ========== */
        .login-section {
            padding: 30px 24px 50px;
            max-width: 480px;
            margin: 0 auto;
            position: relative;
        }

        .login-header {
            margin-bottom: 35px;
        }

        .login-header h1 {
            font-size: 34px;
            font-weight: 800;
            color: white;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .login-header p {
            font-size: 16px;
            color: #22c55e;
            font-weight: 500;
        }

        /* ========== FORM STYLES ========== */
        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 15px;
            font-weight: 600;
            color: white;
            margin-bottom: 10px;
        }

        .form-input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 16px 18px;
            font-size: 15px;
            font-family: inherit;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: rgba(255,255,255,0.25);
        }

        .form-input:focus {
            border-color: rgba(34, 197, 94, 0.4);
            background: rgba(255,255,255,0.06);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.1);
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper .form-input {
            padding-right: 50px;
        }

        .eye-btn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #22c55e;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .eye-btn:hover {
            opacity: 1;
        }

        /* ========== REMEMBER ME ========== */
        .remember-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            margin-top: 4px;
        }

        .remember-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .remember-checkbox {
            width: 18px;
            height: 18px;
            min-width: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 5px;
            background: transparent;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            position: relative;
            transition: all 0.2s;
        }

        .remember-checkbox:checked {
            background: #22c55e;
            border-color: #22c55e;
        }

        .remember-checkbox:checked::after {
            content: '\2713';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 11px;
            font-weight: bold;
        }

        .remember-label {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            font-weight: 400;
            cursor: pointer;
        }

        .forgot-link {
            font-size: 14px;
            color: #22c55e;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        /* ========== LOGIN BUTTON ========== */
        .login-submit-btn {
            width: 100%;
            background: linear-gradient(145deg, #16a34a, #22c55e);
            color: white;
            border: none;
            padding: 18px;
            font-size: 17px;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 8px 30px rgba(34, 197, 94, 0.35);
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
            margin-bottom: 22px;
        }

        .login-submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(34, 197, 94, 0.45);
        }

        .login-submit-btn:active {
            transform: translateY(0);
        }

        .login-submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* ========== FORGOT PASSWORD LINK CENTERED ========== */
        .forgot-password-centered {
            text-align: center;
            margin-bottom: 22px;
        }

        .forgot-password-centered a {
            font-size: 15px;
            color: #22c55e;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-password-centered a:hover {
            text-decoration: underline;
        }

        /* ========== SSL BADGE ========== */
        .ssl-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            font-weight: 400;
        }

        .ssl-badge svg {
            width: 16px;
            height: 16px;
            color: #22c55e;
        }

        /* ========== FOOTER ========== */
        .footer {
            text-align: center;
            padding: 20px 24px;
            border-top: 1px solid rgba(255,255,255,0.06);
            position: relative;
        }

        .footer p {
            font-size: 12.5px;
            color: rgba(255,255,255,0.4);
            font-weight: 400;
        }

        /* ========== RESPONSIVE ========== */
        @media (min-width: 768px) {
            .header {
                padding: 18px 40px;
            }
            .login-section {
                padding: 40px 24px 60px;
                max-width: 520px;
            }
            .login-header h1 {
                font-size: 40px;
            }
            .login-header p {
                font-size: 17px;
            }
        }
    </style>

    <script>
        // ========== INITIAL LOADING SCREEN ==========
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('main-content').classList.add('show');
            }, 3000);
        });

        // ========== FLOATING PARTICLES (CANVAS) ==========
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = Math.random() * 2.5 + 0.8;
                this.speedY = Math.random() * 1.2 + 0.4;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.opacity = Math.random() * 0.5 + 0.15;
                this.glow = Math.random() * 12 + 4;
                this.color = Math.random() > 0.5 ? '34, 197, 94' : '74, 222, 128';
            }

            update() {
                this.y -= this.speedY;
                this.x += this.speedX;
                if (this.y < -10) {
                    this.reset();
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`;
                ctx.shadowBlur = this.glow;
                ctx.shadowColor = `rgba(${this.color}, 0.6)`;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        for (let i = 0; i < 50; i++) {
            const p = new Particle();
            p.y = Math.random() * canvas.height;
            particles.push(p);
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ========== PASSWORD TOGGLE ==========
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>`;
            } else {
                input.type = 'password';
                btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>`;
            }
        }

        // ========== AUTO-FILL REMEMBERED EMAIL ==========
        window.addEventListener('DOMContentLoaded', function() {
            const savedEmail = localStorage.getItem('fairmonie_remember_email');
            const rememberMe = localStorage.getItem('fairmonie_remember') === 'true';

            if (savedEmail && rememberMe) {
                document.getElementById('loginEmail').value = savedEmail;
                document.getElementById('rememberMe').checked = true;
            }
        });

        // ========== LOGIN LOADING MESSAGES ==========
        const loginMessages = [
            "Authenticating your credentials...",
            "Verifying your account...",
            "Securing your session...",
            "Loading your dashboard...",
            "Welcome back!"
        ];

        // ========== LOGIN FORM HANDLER WITH VALIDATION ==========
        function handleLogin(e) {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            // Check if email is registered
            const registeredUsers = JSON.parse(localStorage.getItem('fairmonie_registered_users') || '[]');
            
            if (!registeredUsers.includes(email)) {
                alert('Email not registered! Please create an account first.');
                return;
            }

            // Check password
            const storedPassword = localStorage.getItem('fairmonie_' + email + '_password');
            
            if (password !== storedPassword) {
                alert('Incorrect password! Please try again.');
                return;
            }

            // Login successful - save session
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            // Save email for dashboard (THIS IS THE KEY LINE)
            localStorage.setItem('fairmonie_user_email', email);
            
            // Save username for dashboard
            const username = localStorage.getItem('fairmonie_' + email + '_username') || email;
            localStorage.setItem('fairmonie_username', username);

            // Handle remember me
            if (rememberMe) {
                localStorage.setItem('fairmonie_remember_email', email);
                localStorage.setItem('fairmonie_remember', 'true');
            } else {
                localStorage.removeItem('fairmonie_remember_email');
                localStorage.removeItem('fairmonie_remember');
            }

            localStorage.setItem('fairmonie_logged_in', 'true');
            localStorage.setItem('fairmonie_login_time', new Date().toISOString());

            // Show loading overlay
            const overlay = document.getElementById('login-loading-overlay');
            const textEl = document.getElementById('loginLoadingText');
            const progressEl = document.getElementById('loginProgressFill');
            overlay.classList.add('show');

            // Animate loading
            const totalTime = 3000;
            const messageInterval = 600;
            let messageIndex = 0;
            let elapsed = 0;

            const messageTimer = setInterval(() => {
                if (messageIndex < loginMessages.length) {
                    textEl.style.opacity = '0';
                    setTimeout(() => {
                        textEl.textContent = loginMessages[messageIndex];
                        textEl.style.opacity = '1';
                        messageIndex++;
                    }, 200);
                }
            }, messageInterval);

            const progressTimer = setInterval(() => {
                elapsed += 100;
                const progress = Math.min((elapsed / totalTime) * 100, 100);
                progressEl.style.width = progress + '%';

                if (elapsed >= totalTime) {
                    clearInterval(progressTimer);
                    clearInterval(messageTimer);

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                }
            }, 100);
        }
    </script>
