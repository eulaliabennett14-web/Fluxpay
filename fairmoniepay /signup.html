<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - FairMonie Pay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a1f0a;
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ========== INITIAL LOADING SCREEN ========== */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a1f0a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        #loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-logo {
            width: 100px;
            height: 120px;
            position: relative;
            margin-bottom: 30px;
            animation: loader-pulse 2s ease-in-out infinite;
        }

        @keyframes loader-pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(34, 197, 94, 0.3)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 40px rgba(34, 197, 94, 0.6)); }
        }

        .loader-logo svg {
            width: 100%;
            height: 100%;
        }

        .spinner-container {
            position: relative;
            width: 50px;
            height: 50px;
            margin-bottom: 25px;
        }

        .spinner {
            width: 100%;
            height: 100%;
            border: 3px solid rgba(34, 197, 94, 0.15);
            border-top: 3px solid #22c55e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .spinner-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 32px;
            height: 32px;
            border: 3px solid rgba(74, 222, 128, 0.15);
            border-bottom: 3px solid #4ade80;
            border-radius: 50%;
            animation: spin 0.8s linear infinite reverse;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 16px;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            letter-spacing: 4px;
            animation: pulse-text 1.5s ease-in-out infinite;
        }

        .loading-text span {
            color: #22c55e;
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* ========== CREATE ACCOUNT LOADING OVERLAY ========== */
        #create-loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a1f0a;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        #create-loading-overlay.show {
            display: flex;
            animation: fadeInOverlay 0.4s ease-out;
        }

        @keyframes fadeInOverlay {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .create-spinner-container {
            position: relative;
            width: 60px;
            height: 60px;
            margin-bottom: 35px;
        }

        .create-spinner {
            width: 100%;
            height: 100%;
            border: 4px solid rgba(34, 197, 94, 0.12);
            border-top: 4px solid #22c55e;
            border-right: 4px solid #4ade80;
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
        }

        .create-spinner-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 38px;
            height: 38px;
            border: 3px solid rgba(74, 222, 128, 0.12);
            border-bottom: 3px solid #4ade80;
            border-left: 3px solid #22c55e;
            border-radius: 50%;
            animation: spin 0.9s linear infinite reverse;
        }

        .create-loading-text {
            font-size: 17px;
            font-weight: 600;
            color: rgba(255,255,255,0.85);
            text-align: center;
            max-width: 280px;
            line-height: 1.5;
            min-height: 52px;
            transition: opacity 0.4s ease;
        }

        .create-loading-dots {
            display: inline-block;
            width: 20px;
            text-align: left;
        }

        .create-progress-bar {
            width: 200px;
            height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 3px;
            margin-top: 30px;
            overflow: hidden;
        }

        .create-progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #16a34a, #22c55e, #4ade80);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        /* ========== AURORA BACKGROUND ========== */
        .aurora-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .aurora-wave {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            opacity: 0.12;
            animation: aurora-rotate 20s linear infinite;
        }

        .aurora-wave:nth-child(1) {
            background: radial-gradient(ellipse at 30% 50%, rgba(34, 197, 94, 0.5) 0%, transparent 50%);
            animation-duration: 25s;
        }

        .aurora-wave:nth-child(2) {
            background: radial-gradient(ellipse at 70% 50%, rgba(74, 222, 128, 0.4) 0%, transparent 50%);
            animation-duration: 30s;
            animation-direction: reverse;
        }

        .aurora-wave:nth-child(3) {
            background: radial-gradient(ellipse at 50% 80%, rgba(34, 197, 94, 0.3) 0%, transparent 40%);
            animation-duration: 35s;
        }

        @keyframes aurora-rotate {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* ========== FLOATING PARTICLES CANVAS ========== */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* ========== MAIN CONTENT ========== */
        #main-content {
            display: none;
            position: relative;
            z-index: 2;
            min-height: 100vh;
            opacity: 0;
        }

        #main-content.show {
            display: block;
            animation: fadeInSlow 1.5s ease-out forwards;
        }

        @keyframes fadeInSlow {
            0% { opacity: 0; transform: translateY(30px); }
            30% { opacity: 0.3; transform: translateY(20px); }
            60% { opacity: 0.7; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ========== GLASSMORPHISM NAVBAR ========== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            position: sticky;
            top: 0;
            background: rgba(10, 31, 10, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo-icon {
            width: 38px;
            height: 38px;
            filter: drop-shadow(0 0 10px rgba(34, 197, 94, 0.4));
        }

        .header-brand {
            font-size: 20px;
            font-weight: 700;
            color: white;
            letter-spacing: -0.3px;
        }

        .header-brand span {
            color: #22c55e;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .login-btn {
            background: transparent;
            border: 1.5px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.8);
            padding: 10px 24px;
            border-radius: 25px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .login-btn:hover {
            border-color: rgba(255,255,255,0.3);
            color: white;
        }

        .signup-btn-header {
            background: linear-gradient(145deg, #16a34a, #22c55e);
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 25px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }

        .signup-btn-header:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
        }

        /* ========== SIGNUP FORM SECTION ========== */
        .signup-section {
            padding: 30px 24px 50px;
            max-width: 480px;
            margin: 0 auto;
            position: relative;
        }

        .signup-header {
            margin-bottom: 35px;
        }

        .signup-header h1 {
            font-size: 34px;
            font-weight: 800;
            color: white;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .signup-header p {
            font-size: 16px;
            color: #22c55e;
            font-weight: 500;
        }

        /* ========== FORM STYLES ========== */
        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 15px;
            font-weight: 600;
            color: white;
            margin-bottom: 10px;
        }

        .form-input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 16px 18px;
            font-size: 15px;
            font-family: inherit;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: rgba(255,255,255,0.25);
        }

        .form-input:focus {
            border-color: rgba(34, 197, 94, 0.4);
            background: rgba(255,255,255,0.06);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.1);
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper .form-input {
            padding-right: 50px;
        }

        .eye-btn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #22c55e;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .eye-btn:hover {
            opacity: 1;
        }

        .referral-note {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            margin-top: 6px;
        }

        /* ========== CHECKBOX ========== */
        .terms-group {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 28px;
            margin-top: 8px;
        }

        .terms-checkbox {
            width: 20px;
            height: 20px;
            min-width: 20px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 5px;
            background: transparent;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            position: relative;
            margin-top: 2px;
            transition: all 0.2s;
        }

        .terms-checkbox:checked {
            background: #22c55e;
            border-color: #22c55e;
        }

        .terms-checkbox:checked::after {
            content: '\2713';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .terms-text {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            line-height: 1.5;
            font-weight: 400;
        }

        .terms-text a {
            color: #22c55e;
            text-decoration: none;
            font-weight: 500;
        }

        .terms-text a:hover {
            text-decoration: underline;
        }

        /* ========== CREATE ACCOUNT BUTTON ========== */
        .create-account-btn {
            width: 100%;
            background: linear-gradient(145deg, #16a34a, #22c55e);
            color: white;
            border: none;
            padding: 18px;
            font-size: 17px;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 8px 30px rgba(34, 197, 94, 0.35);
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
            margin-bottom: 22px;
        }

        .create-account-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(34, 197, 94, 0.45);
        }

        .create-account-btn:active {
            transform: translateY(0);
        }

        .create-account-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* ========== SSL BADGE ========== */
        .ssl-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            font-weight: 400;
        }

        .ssl-badge svg {
            width: 16px;
            height: 16px;
            color: #22c55e;
        }

        /* ========== FOOTER ========== */
        .footer {
            text-align: center;
            padding: 20px 24px;
            border-top: 1px solid rgba(255,255,255,0.06);
            position: relative;
        }

        .footer p {
            font-size: 12.5px;
            color: rgba(255,255,255,0.4);
            font-weight: 400;
        }

        /* ========== RESPONSIVE ========== */
        @media (min-width: 768px) {
            .header {
                padding: 18px 40px;
            }
            .signup-section {
                padding: 40px 24px 60px;
                max-width: 520px;
            }
            .signup-header h1 {
                font-size: 40px;
            }
            .signup-header p {
                font-size: 17px;
            }
        }
    </style>

<body>

    <!-- ========== INITIAL LOADING SCREEN ========== -->
    <div id="loading-screen">
        <div class="loader-logo">
            <svg viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 5 L90 20 L90 55 C90 85 50 115 50 115 C50 115 10 85 10 55 L10 20 Z" 
                      fill="url(#shieldGrad)" stroke="#22c55e" stroke-width="2"/>
                <path d="M50 15 L80 27 L80 53 C80 78 50 102 50 102 C50 102 20 78 20 53 L20 27 Z" 
                      stroke="rgba(34,197,94,0.3)" stroke-width="1" fill="none"/>
                <text x="50" y="62" text-anchor="middle" fill="#22c55e" font-size="38" font-weight="900" font-family="Arial, sans-serif">F</text>
                <text x="50" y="85" text-anchor="middle" fill="#4ade80" font-size="18" font-weight="700" font-family="Arial, sans-serif">$</text>
                <circle cx="50" cy="55" r="42" stroke="rgba(34,197,94,0.15)" stroke-width="1" fill="none"/>
                <defs>
                    <linearGradient id="shieldGrad" x1="0" y1="0" x2="100" y2="120">
                        <stop offset="0%" stop-color="#1a5c1a"/>
                        <stop offset="100%" stop-color="#0d3d0d"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>
        <div class="spinner-container">
            <div class="spinner"></div>
            <div class="spinner-inner"></div>
        </div>
        <div class="loading-text">LOADING<span>...</span></div>
    </div>

    <!-- ========== CREATE ACCOUNT LOADING OVERLAY ========== -->
    <div id="create-loading-overlay">
        <div class="create-spinner-container">
            <div class="create-spinner"></div>
            <div class="create-spinner-inner"></div>
        </div>
        <div class="create-loading-text" id="createLoadingText">Preparing your dashboard...</div>
        <div class="create-progress-bar">
            <div class="create-progress-fill" id="createProgressFill"></div>
        </div>
    </div>

    <!-- ========== AURORA BACKGROUND ========== -->
    <div class="aurora-bg">
        <div class="aurora-wave"></div>
        <div class="aurora-wave"></div>
        <div class="aurora-wave"></div>
    </div>

    <!-- ========== FLOATING PARTICLES CANVAS ========== -->
    <canvas id="particles-canvas"></canvas>

    <!-- ========== MAIN CONTENT ========== -->
    <div id="main-content">

        <!-- Glassmorphism Header -->
        <header class="header">
            <div class="header-left">
                <svg class="header-logo-icon" viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 5 L90 20 L90 55 C90 85 50 115 50 115 C50 115 10 85 10 55 L10 20 Z" 
                          fill="url(#shieldGrad2)" stroke="#22c55e" stroke-width="2.5"/>
                    <path d="M50 15 L80 27 L80 53 C80 78 50 102 50 102 C50 102 20 78 20 53 L20 27 Z" 
                          stroke="rgba(34,197,94,0.4)" stroke-width="1" fill="none"/>
                    <text x="50" y="62" text-anchor="middle" fill="#22c55e" font-size="38" font-weight="900" font-family="Arial, sans-serif">F</text>
                    <text x="50" y="85" text-anchor="middle" fill="#4ade80" font-size="18" font-weight="700" font-family="Arial, sans-serif">$</text>
                    <defs>
                        <linearGradient id="shieldGrad2" x1="0" y1="0" x2="100" y2="120">
                            <stop offset="0%" stop-color="#1a5c1a"/>
                            <stop offset="100%" stop-color="#0d3d0d"/>
                        </linearGradient>
                    </defs>
                </svg>
                <div class="header-brand">FairMonie <span>Pay</span></div>
            </div>
            <div class="header-right">
                <a href="login.html" class="login-btn">Login</a>
                <a href="signup.html" class="signup-btn-header">Sign Up</a>
            </div>
        </header>

        <!-- Signup Form Section -->
        <section class="signup-section">
            <div class="signup-header">
                <h1>Create account</h1>
                <p>Start your financial journey today.</p>
            </div>

            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-input" id="signupUsername" placeholder="Your full name" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="signupEmail" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-input" id="password" placeholder="Create a strong password" required>
                        <button type="button" class="eye-btn" onclick="togglePassword('password', this)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-input" id="confirmPassword" placeholder="Re-enter your password" required>
                        <button type="button" class="eye-btn" onclick="togglePassword('confirmPassword', this)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Referral code (optional)</label>
                    <input type="text" class="form-input" id="referralCode" placeholder="ABC12345">
                </div>

                <div class="terms-group">
                    <input type="checkbox" class="terms-checkbox" id="terms" required>
                    <label for="terms" class="terms-text">
                        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="create-account-btn" id="createBtn">Create Account</button>

                <div class="ssl-badge">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                    <span>256-bit SSL Encrypted</span>
                </div>
            </form>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>&#169; 2026 FairMonie Pay. All rights reserved.</p>
        </footer>

    </div>

    <script>
        // ========== INITIAL LOADING SCREEN ==========
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('main-content').classList.add('show');
            }, 3000);
        });

        // ========== FLOATING PARTICLES (CANVAS) ==========
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = Math.random() * 2.5 + 0.8;
                this.speedY = Math.random() * 1.2 + 0.4;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.opacity = Math.random() * 0.5 + 0.15;
                this.glow = Math.random() * 12 + 4;
                this.color = Math.random() > 0.5 ? '34, 197, 94' : '74, 222, 128';
            }

            update() {
                this.y -= this.speedY;
                this.x += this.speedX;
                if (this.y < -10) {
                    this.reset();
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`;
                ctx.shadowBlur = this.glow;
                ctx.shadowColor = `rgba(${this.color}, 0.6)`;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        for (let i = 0; i < 50; i++) {
            const p = new Particle();
            p.y = Math.random() * canvas.height;
            particles.push(p);
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ========== PASSWORD TOGGLE ==========
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>`;
            } else {
                input.type = 'password';
                btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>`;
            }
        }

        // ========== CREATE ACCOUNT LOADING MESSAGES ==========
        const loadingMessages = [
            "Preparing your dashboard...",
            "Setting things up...",
            "Creating your account...",
            "Verifying your details...",
            "Securing your wallet...",
            "Generating your referral link...",
            "Almost there...",
            "Finalizing your profile...",
            "Loading your dashboard...",
            "Welcome to FairMonie Pay!"
        ];

        // ========== FORM HANDLER WITH LOADING ==========
        async function handleSignup(e) {
            e.preventDefault();

            // Get values
            const username = document.getElementById('signupUsername').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const referral = document.getElementById('referralCode').value.trim();

            // Password must be 8+ characters
            if (password.length < 8) {
                alert('Password must be at least 8 characters!');
                return;
            }

            // Passwords must match
            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }

            const btn = document.getElementById('createBtn');
            btn.disabled = true;
            btn.textContent = 'Creating account...';

            // Show loading overlay
            const overlay = document.getElementById('create-loading-overlay');
            const textEl = document.getElementById('createLoadingText');
            const progressEl = document.getElementById('createProgressFill');
            overlay.classList.add('show');

            // Generate referral code for this new user
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let myReferralCode = 'FMP';
            for (let i = 0; i < 6; i++) myReferralCode += chars.charAt(Math.floor(Math.random() * chars.length));

            // ========== SAVE TO SUPABASE ==========
            if (supabaseClient) {
                try {
                    // Check if user already exists
                    const { data: existingUser } = await supabaseClient
                        .from('users')
                        .select('email')
                        .eq('email', email)
                        .single();

                    if (existingUser) {
                        alert('Email already registered! Please login.');
                        btn.disabled = false;
                        btn.textContent = 'Create Account';
                        overlay.classList.remove('show');
                        return;
                    }

                    // Save new user to Supabase
                    const { error } = await supabaseClient
                        .from('users')
                        .insert([{
                            email: email,
                            username: username,
                            password: password,
                            referral_code: myReferralCode,
                            balance: 0,
                            earned: 0,
                            checkins: 0,
                            referral_balance: 0,
                            referral_count: 0,
                            referral_earned: 0,
                            created_at: new Date().toISOString()
                        }]);

                    if (error) {
                        console.error('Supabase error:', error);
                        // Continue with localStorage fallback
                    } else {
                        console.log('User saved to Supabase!');
                    }

                    // Handle referral if provided
                    if (referral) {
                        // Find referrer by referral code
                        const { data: referrer } = await supabaseClient
                            .from('users')
                            .select('*')
                            .eq('referral_code', referral)
                            .single();

                        if (referrer) {
                            // Credit referrer: +₦3,800
                            const newRefBalance = (referrer.referral_balance || 0) + 3800;
                            const newRefCount = (referrer.referral_count || 0) + 1;
                            const newRefEarned = (referrer.referral_earned || 0) + 3800;

                            await supabaseClient
                                .from('users')
                                .update({
                                    referral_balance: newRefBalance,
                                    referral_count: newRefCount,
                                    referral_earned: newRefEarned
                                })
                                .eq('email', referrer.email);

                            // Save referral history
                            await supabaseClient
                                .from('referrals')
                                .insert([{
                                    referrer_email: referrer.email,
                                    referred_email: email,
                                    referred_name: username,
                                    amount: 3800,
                                    date: new Date().toISOString()
                                }]);

                            console.log('Referrer credited in Supabase!');
                        }
                    }
                } catch (err) {
                    console.error('Supabase save failed:', err);
                    // Fallback to localStorage only
                }
            }

            // ========== SAVE TO LOCALSTORAGE (ALWAYS) ==========
            localStorage.setItem('fairmonie_user_email', email);
            localStorage.setItem('fairmonie_' + email + '_username', username);
            localStorage.setItem('fairmonie_' + email + '_password', password);
            localStorage.setItem('fairmonie_' + email + '_balance', '0');
            localStorage.setItem('fairmonie_' + email + '_earned', '0');
            localStorage.setItem('fairmonie_' + email + '_checkins', '0');
            localStorage.setItem('fairmonie_' + email + '_lastcheckin', '');
            localStorage.setItem('fairmonie_' + email + '_bonus_claimed', 'false');
            localStorage.setItem('fairmonie_' + email + '_last_bonus_date', '');
            localStorage.setItem('fairmonie_' + email + '_referral_code', myReferralCode);
            if (referral) localStorage.setItem('fairmonie_' + email + '_referral', referral);

            // Add to registered users list
            let registeredUsers = JSON.parse(localStorage.getItem('fairmonie_registered_users') || '[]');
            if (!registeredUsers.includes(email)) {
                registeredUsers.push(email);
                localStorage.setItem('fairmonie_registered_users', JSON.stringify(registeredUsers));
            }

            // ========== CREDIT THE REFERRER (LOCALSTORAGE FALLBACK) ==========
            var pendingRef = localStorage.getItem('fairmonie_pending_ref');
            var pendingRefEmail = localStorage.getItem('fairmonie_pending_ref_email');
            if (pendingRef && pendingRefEmail) {
                var creditedRefs = JSON.parse(localStorage.getItem('fairmonie_credited_refs') || '[]');
                if (creditedRefs.indexOf(pendingRef + '_' + email) === -1) {
                    var refBalance = parseInt(localStorage.getItem('fairmonie_' + pendingRefEmail + '_referral_balance') || '0');
                    var refCount = parseInt(localStorage.getItem('fairmonie_' + pendingRefEmail + '_referral_count') || '0');
                    var refEarned = parseInt(localStorage.getItem('fairmonie_' + pendingRefEmail + '_referral_earned') || '0');
                    refBalance += 3800;
                    refCount += 1;
                    refEarned += 3800;
                    localStorage.setItem('fairmonie_' + pendingRefEmail + '_referral_balance', refBalance.toString());
                    localStorage.setItem('fairmonie_' + pendingRefEmail + '_referral_count', refCount.toString());
                    localStorage.setItem('fairmonie_' + pendingRefEmail + '_referral_earned', refEarned.toString());

                    var history = JSON.parse(localStorage.getItem('fairmonie_' + pendingRefEmail + '_referral_history') || '[]');
                    history.unshift({
                        name: username || 'New User',
                        date: new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }),
                        amount: 3800
                    });
                    localStorage.setItem('fairmonie_' + pendingRefEmail + '_referral_history', JSON.stringify(history));

                    creditedRefs.push(pendingRef + '_' + email);
                    localStorage.setItem('fairmonie_credited_refs', JSON.stringify(creditedRefs));

                    var notifs = JSON.parse(localStorage.getItem('fairmonie_' + pendingRefEmail + '_notifications') || '[]');
                    notifs.unshift({
                        id: Date.now(),
                        type: 'referral',
                        title: 'New Referral! +₦3,800',
                        message: 'Someone signed up using your referral link!',
                        amount: '+₦3,800',
                        amountType: 'credit',
                        time: new Date().toISOString(),
                        read: false
                    });
                    localStorage.setItem('fairmonie_' + pendingRefEmail + '_notifications', JSON.stringify(notifs));
                }
                localStorage.removeItem('fairmonie_pending_ref');
                localStorage.removeItem('fairmonie_pending_ref_email');
            }

            // Loading animation
            const totalTime = 7000;
            const messageInterval = 700;
            let messageIndex = 0;
            let elapsed = 0;

            const messageTimer = setInterval(() => {
                if (messageIndex < loadingMessages.length) {
                    textEl.style.opacity = '0';
                    setTimeout(() => {
                        textEl.textContent = loadingMessages[messageIndex];
                        textEl.style.opacity = '1';
                        messageIndex++;
                    }, 200);
                }
            }, messageInterval);

            const progressTimer = setInterval(() => {
                elapsed += 100;
                const progress = Math.min((elapsed / totalTime) * 100, 100);
                progressEl.style.width = progress + '%';

                if (elapsed >= totalTime) {
                    clearInterval(progressTimer);
                    clearInterval(messageTimer);

                    setTimeout(() => {
                        window.location.href = 'onboarding.html';
                    }, 500);
                }
            }, 100);
        }

        // ========== REFERRAL URL DETECTION ==========
        (function() {
            var urlParams = new URLSearchParams(window.location.search);
            var refCode = urlParams.get('ref');
            if (refCode) {
                var allKeys = Object.keys(localStorage);
                var referrerEmail = null;
                for (var i = 0; i < allKeys.length; i++) {
                    if (allKeys[i].indexOf('_referral_code') !== -1) {
                        var storedCode = localStorage.getItem(allKeys[i]);
                        if (storedCode === refCode) {
                            referrerEmail = allKeys[i].split('_referral_code')[0].replace('fairmonie_', '');
                            break;
                        }
                    }
                }
                if (referrerEmail) {
                    localStorage.setItem('fairmonie_pending_ref', refCode);
                    localStorage.setItem('fairmonie_pending_ref_email', referrerEmail);
                }
            }
        })();
    </script>
