<html lang="en">

<meta name="theme-color" content="#00d4aa">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #060d1a; --bg-secondary: #0a1228; --accent-green: #00d4aa;
            --accent-green-dark: #00a884; --accent-orange: #ff8c00; --accent-gold: #ffd700;
            --text-white: #ffffff; --text-muted: rgba(255,255,255,0.55); --text-dim: rgba(255,255,255,0.35);
            --border-subtle: rgba(255,255,255,0.04); --border-light: rgba(255,255,255,0.07);
            --border-medium: rgba(255,255,255,0.12); --error-red: #ff4757;
            --shadow-green: rgba(0,168,132,0.4); --shadow-green-soft: rgba(0,168,132,0.1);
            --transition-smooth: all 0.35s cubic-bezier(0.4,0,0.2,1);
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary); color: var(--text-white);
            overflow-x: hidden; min-height: 100vh;
            -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
            background-image:
                radial-gradient(ellipse at 30% 10%, rgba(0,212,170,0.03) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 90%, rgba(255,140,0,0.03) 0%, transparent 60%);
        }

        #bg-particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; opacity: 0.5; }

        .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, #060d1a 0%, #0a1228 50%, #0a1e30 100%); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s cubic-bezier(0.4,0,0.2,1), visibility 0.8s cubic-bezier(0.4,0,0.2,1), transform 0.8s cubic-bezier(0.4,0,0.2,1); }
        .loading-screen.hidden { opacity: 0; visibility: hidden; transform: scale(1.1); pointer-events: none; }
        .loading-screen.exit { animation: exit-burst 0.6s cubic-bezier(0.68,-0.55,0.265,1.55) forwards; }
        @keyframes exit-burst { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } 100% { transform: scale(1.2); opacity: 0; } }
        .loader-bg-glow { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,212,170,0.06) 0%, transparent 70%); animation: glow-pulse 2s ease-in-out infinite; }
        @keyframes glow-pulse { 0%,100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } }
        .loader-particles { position: absolute; width: 100%; height: 100%; overflow: hidden; pointer-events: none; }
        .loader-particle { position: absolute; width: 4px; height: 4px; background: var(--accent-gold); border-radius: 50%; opacity: 0.3; animation: float-particle 3s ease-in-out infinite; }
        @keyframes float-particle { 0%,100% { transform: translateY(0) translateX(0); opacity: 0.3; } 50% { transform: translateY(-30px) translateX(15px); opacity: 0.8; } }
        .spinner-container { position: relative; width: 180px; height: 180px; margin-bottom: 36px; }
        .spinner-ring-outer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; animation: spin-cw 3s linear infinite; }
        .spinner-ring-outer svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .spinner-ring-outer circle { fill: none; stroke-width: 3; stroke-linecap: round; }
        .ring-outer-track { stroke: rgba(255,255,255,0.04); }
        .ring-outer-progress { stroke: url(#gradient-outer); stroke-dasharray: 565; stroke-dashoffset: 565; animation: fill-ring 3s ease-in-out forwards, spin-cw 3s linear infinite; filter: drop-shadow(0 0 8px rgba(0,212,170,0.4)); }
        .spinner-ring-inner { position: absolute; top: 20px; left: 20px; width: 140px; height: 140px; animation: spin-ccw 2.5s linear infinite; }
        .spinner-ring-inner svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .spinner-ring-inner circle { fill: none; stroke-width: 2.5; stroke-linecap: round; }
        .ring-inner-track { stroke: rgba(255,255,255,0.03); }
        .ring-inner-progress { stroke: url(#gradient-inner); stroke-dasharray: 440; stroke-dashoffset: 440; animation: fill-ring-inner 3s ease-in-out forwards, spin-ccw 2.5s linear infinite; filter: drop-shadow(0 0 6px rgba(255,140,0,0.3)); }
        .spinner-core { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 90px; height: 90px; background: linear-gradient(135deg, rgba(0,212,170,0.12), rgba(255,140,0,0.1)); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); animation: core-pulse 2s ease-in-out infinite; }
        @keyframes core-pulse { 0%,100% { box-shadow: 0 0 20px rgba(0,212,170,0.15), inset 0 0 20px rgba(255,255,255,0.03); } 50% { box-shadow: 0 0 40px rgba(0,212,170,0.3), inset 0 0 30px rgba(255,255,255,0.06); } }
        .spinner-core .core-icon { font-size: 26px; animation: icon-bounce 1s ease-in-out infinite; }
        @keyframes icon-bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        .spinner-core .core-text { font-size: 10px; font-weight: 700; color: var(--accent-green); margin-top: 4px; letter-spacing: 2px; text-transform: uppercase; }
        .orbit-coin { position: absolute; width: 24px; height: 24px; background: linear-gradient(145deg, #ffd700, #daa520); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: #8b6914; box-shadow: 0 0 12px rgba(255,215,0,0.3), inset 0 -2px 4px rgba(0,0,0,0.15); z-index: 10; }
        .orbit-coin-1 { animation: orbit-1 4s linear infinite; }
        .orbit-coin-2 { animation: orbit-2 3.5s linear infinite; width: 20px; height: 20px; font-size: 9px; }
        .orbit-coin-3 { animation: orbit-3 5s linear infinite; width: 18px; height: 18px; font-size: 8px; }
        @keyframes orbit-1 { 0% { transform: rotate(0deg) translateX(100px) rotate(0deg); } 100% { transform: rotate(360deg) translateX(100px) rotate(-360deg); } }
        @keyframes orbit-2 { 0% { transform: rotate(180deg) translateX(82px) rotate(-180deg); } 100% { transform: rotate(540deg) translateX(82px) rotate(-540deg); } }
        @keyframes orbit-3 { 0% { transform: rotate(90deg) translateX(118px) rotate(-90deg); } 100% { transform: rotate(450deg) translateX(118px) rotate(-450deg); } }
        .sparkle { position: absolute; width: 5px; height: 5px; background: var(--accent-gold); border-radius: 50%; animation: sparkle-anim 1.5s ease-in-out infinite; }
        @keyframes sparkle-anim { 0%,100% { opacity: 0; transform: scale(0); } 50% { opacity: 1; transform: scale(1); } }
        @keyframes spin-cw { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spin-ccw { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
        @keyframes fill-ring { 0% { stroke-dashoffset: 565; } 100% { stroke-dashoffset: 0; } }
        @keyframes fill-ring-inner { 0% { stroke-dashoffset: 440; } 100% { stroke-dashoffset: 0; } }
        .loader-text-container { text-align: center; margin-top: 16px; }
        .loader-main-text { font-size: 16px; font-weight: 700; color: var(--text-white); margin-bottom: 6px; min-height: 24px; transition: opacity 0.2s ease; }
        .loader-sub-text { font-size: 13px; color: var(--text-muted); font-weight: 500; transition: opacity 0.2s ease; }
        .loader-percentage { font-size: 42px; font-weight: 800; background: linear-gradient(90deg, var(--accent-green), var(--accent-gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-top: 14px; font-variant-numeric: tabular-nums; }
        .loader-progress-bar { width: 180px; height: 3px; background: rgba(255,255,255,0.04); border-radius: 3px; overflow: hidden; margin-top: 18px; position: relative; }
        .loader-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-green), var(--accent-orange), var(--accent-gold)); border-radius: 3px; width: 0%; transition: width 0.05s linear; position: relative; }
        .loader-progress-fill::after { content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; background: var(--accent-gold); border-radius: 50%; box-shadow: 0 0 10px var(--accent-gold); animation: glow-dot 0.5s ease-in-out infinite alternate; }
        @keyframes glow-dot { from { box-shadow: 0 0 5px var(--accent-gold); } to { box-shadow: 0 0 15px var(--accent-gold), 0 0 30px var(--accent-gold); } }

        .main-page { opacity: 0; transform: translateY(20px); transition: opacity 0.8s cubic-bezier(0.4,0,0.2,1), transform 0.8s cubic-bezier(0.4,0,0.2,1); }
        .main-page.visible { opacity: 1; transform: translateY(0); }

        .navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: rgba(6,13,26,0.88); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-bottom: 1px solid var(--border-subtle); }
        .back-btn { display: flex; align-items: center; gap: 6px; color: var(--text-muted); text-decoration: none; font-size: 13px; font-weight: 500; transition: var(--transition-smooth); padding: 8px 12px; border-radius: 8px; }
        .back-btn:hover { color: var(--text-white); background: rgba(255,255,255,0.04); }
        .back-btn svg { width: 18px; height: 18px; }
        .logo-section { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-icon { width: 34px; height: 34px; background: linear-gradient(135deg, var(--accent-green), var(--accent-green-dark)); border-radius: 8px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .logo-icon::before { content: ''; position: absolute; width: 60%; height: 60%; background: linear-gradient(135deg, #fff, rgba(255,255,255,0.8)); border-radius: 50%; animation: pulse-glow 2s ease-in-out infinite; }
        .logo-icon::after { content: '⚡'; position: absolute; font-size: 15px; z-index: 2; }
        @keyframes pulse-glow { 0%,100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.2); opacity: 1; } }
        .logo-text { font-size: 18px; font-weight: 700; color: var(--text-white); letter-spacing: -0.3px; }

        .form-container { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 90px 20px 40px; position: relative; z-index: 1; }
        .form-card { width: 100%; max-width: 420px; background: rgba(255,255,255,0.025); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 36px 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.03); position: relative; overflow: hidden; }
        .form-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(0,212,170,0.25), transparent); }
        .form-header { text-align: center; margin-bottom: 28px; }
        .form-title { font-size: 24px; font-weight: 800; color: var(--text-white); margin-bottom: 6px; letter-spacing: -0.3px; }
        .form-subtitle { font-size: 13px; color: var(--text-muted); font-weight: 400; }

        .form-group { margin-bottom: 16px; position: relative; }
        .form-label { display: block; font-size: 10px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; transition: color 0.3s ease; }
        .form-group:focus-within .form-label { color: var(--accent-green); }
        .form-input { width: 100%; padding: 13px 14px; background: rgba(255,255,255,0.03); border: 1.5px solid rgba(255,255,255,0.07); border-radius: 12px; color: var(--text-white); font-size: 14px; font-weight: 500; transition: var(--transition-smooth); outline: none; font-family: 'Inter', sans-serif; }
        .form-input::placeholder { color: rgba(255,255,255,0.2); font-weight: 400; font-size: 13px; }
        .form-input:hover { border-color: rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); }
        .form-input:focus { border-color: var(--accent-green); background: rgba(0,212,170,0.04); box-shadow: 0 0 0 3px rgba(0,212,170,0.08), 0 0 15px rgba(0,212,170,0.08); }
        .form-input.error { border-color: var(--error-red); background: rgba(255,71,87,0.04); animation: shake 0.5s ease-in-out; }
        @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
        .input-wrapper { position: relative; }
        .password-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 16px; padding: 4px; transition: color 0.3s ease; z-index: 2; }
        .password-toggle:hover { color: var(--text-white); }
        .error-message { font-size: 11px; color: var(--error-red); margin-top: 5px; display: none; align-items: center; gap: 4px; }
        .error-message.visible { display: flex; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
        .forgot-password { text-align: right; margin-top: -6px; margin-bottom: 20px; }
        .forgot-password a { color: var(--accent-green); text-decoration: none; font-size: 12px; font-weight: 500; transition: var(--transition-smooth); }
        .forgot-password a:hover { color: var(--accent-green-dark); text-decoration: underline; }

        .btn-login { width: 100%; padding: 15px; background: linear-gradient(135deg, #00a884, #008f6b, #00a884); background-size: 200% auto; color: var(--text-white); font-size: 15px; font-weight: 700; border: none; border-radius: 14px; cursor: pointer; transition: var(--transition-smooth); box-shadow: 0 4px 20px var(--shadow-green), 0 0 40px var(--shadow-green-soft); animation: btn-pulse 2s ease-in-out infinite; position: relative; overflow: hidden; font-family: 'Inter', sans-serif; }
        @keyframes btn-pulse { 0%,100% { box-shadow: 0 4px 20px var(--shadow-green), 0 0 40px var(--shadow-green-soft); } 50% { box-shadow: 0 4px 30px rgba(0,168,132,0.6), 0 0 60px rgba(0,168,132,0.25); } }
        .btn-login:hover { transform: translateY(-2px); background-position: right center; }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; animation: none; }
        .btn-login .btn-text { transition: opacity 0.3s ease; }
        .btn-login.loading .btn-text { opacity: 0; }
        .btn-spinner { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; opacity: 0; transition: opacity 0.3s ease; }
        .btn-login.loading .btn-spinner { opacity: 1; }
        @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

        .create-link { text-align: center; margin-top: 22px; font-size: 13px; color: var(--text-muted); }
        .create-link a { color: var(--accent-green); text-decoration: none; font-weight: 600; transition: var(--transition-smooth); }
        .create-link a:hover { color: var(--accent-green-dark); text-decoration: underline; }

        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(26, 35, 50, 0.95); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 10px 16px; display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; color: var(--text-white); z-index: 1001; opacity: 0; transition: all 0.4s ease; box-shadow: 0 8px 12px rgba(0,0,0,0.4); max-width: 90vw; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast-icon { width: 22px; height: 22px; border-radius: 6px; background: rgba(0,212,170,0.15); display: flex; align-items: center; justify-content: center; color: var(--accent-green); font-size: 12px; flex-shrink: 0; }
        .toast.error .toast-icon { background: rgba(255,71,87,0.15); color: var(--error-red); }
        .toast-text { line-height: 1.4; }

        @media (max-width: 480px) { .form-card { padding: 30px 18px; border-radius: 18px; } .form-title { font-size: 22px; } .spinner-container { width: 150px; height: 150px; } .spinner-core { width: 76px; height: 76px; } .loader-percentage { font-size: 34px; } .navbar { padding: 12px 16px; } }
        @media (prefers-reduced-motion: reduce) { .spinner-ring-outer, .spinner-ring-inner, .orbit-coin, .loader-particle { animation: none !important; transition: none !important; } .ring-outer-progress, .ring-inner-progress { animation: none !important; stroke-dashoffset: 0 !important; } .loader-progress-fill { transition: none !important; width: 100% !important; } }
    </style>
</head>

            var ctx = canvas.getContext('2d');
            var particles = [], w, h;
            function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
            resize(); window.addEventListener('resize', resize);
            function Particle() { this.reset(); }
            Particle.prototype.reset = function() {
                this.x = Math.random() * w; this.y = Math.random() * h;
                this.size = Math.random() * 2 + 0.5;
                this.speedY = -(Math.random() * 0.3 + 0.1);
                this.speedX = (Math.random() - 0.5) * 0.15;
                this.opacity = Math.random() * 0.3 + 0.05;
                this.color = Math.random() > 0.5 ? '0, 212, 170' : '255, 215, 0';
                this.life = Math.random() * 300 + 200;
            };
            Particle.prototype.update = function() {
                this.y += this.speedY; this.x += this.speedX; this.life--;
                if (this.y < -10 || this.life <= 0) { this.y = h + 10; this.x = Math.random() * w; this.life = Math.random() * 300 + 200; }
                if (this.x < -10) this.x = w + 10; if (this.x > w + 10) this.x = -10;
            };
            Particle.prototype.draw = function() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(' + this.color + ', ' + this.opacity + ')'; ctx.fill();
            };
            var count = window.innerWidth < 768 ? 30 : 50;
            for (var i = 0; i < count; i++) { var p = new Particle(); p.y = Math.random() * h; particles.push(p); }
            function animate() { ctx.clearRect(0, 0, w, h); for (var i = 0; i < particles.length; i++) { particles[i].update(); particles[i].draw(); } requestAnimationFrame(animate); }
            animate();
        })();

        // ========== LOADING SCREEN - FIXED ==========
        (function() {
            var loadingScreen = document.getElementById('loadingScreen');
            var loaderMainText = document.getElementById('loaderMainText');
            var loaderSubText = document.getElementById('loaderSubText');
            var loaderPercentage = document.getElementById('loaderPercentage');
            var loaderProgressFill = document.getElementById('loaderProgressFill');
            var loaderParticles = document.getElementById('loaderParticles');
            var mainPage = document.getElementById('mainPage');

            if (!loadingScreen || !loaderPercentage) { 
                if (mainPage) mainPage.classList.add('visible'); 
                return; 
            }

            if (loaderParticles) {
                for (var i = 0; i < 25; i++) {
                    var particle = document.createElement('div'); particle.className = 'loader-particle';
                    particle.style.left = Math.random() * 100 + '%'; particle.style.top = Math.random() * 100 + '%';
                    particle.style.animationDelay = Math.random() * 3 + 's'; particle.style.animationDuration = (2 + Math.random() * 2) + 's';
                    particle.style.width = (2 + Math.random() * 4) + 'px'; particle.style.height = particle.style.width;
                    loaderParticles.appendChild(particle);
                }
            }

            var messages = [
                { main: 'Preparing login...', sub: 'Loading your account securely' },
                { main: 'Verifying credentials...', sub: 'Checking your details' },
                { main: 'Almost ready...', sub: 'Opening your dashboard' }
            ];
            var progress = 0, msgIndex = 0, done = false;
            var duration = 2500, interval = 40;
            var step = 100 / (duration / interval);

            function setProgress(pct) {
                var c = Math.min(Math.max(pct, 0), 100);
                if (loaderProgressFill) { 
                    loaderProgressFill.style.width = c + '%'; 
                }
                if (loaderPercentage) loaderPercentage.textContent = Math.floor(c) + '%';
                var idx = Math.min(Math.floor(c / (100 / messages.length)), messages.length - 1);
                if (idx !== msgIndex && loaderMainText && loaderSubText) {
                    msgIndex = idx; 
                    loaderMainText.style.opacity = '0'; 
                    loaderSubText.style.opacity = '0';
                    setTimeout(function() {
                        if (loaderMainText) loaderMainText.textContent = messages[idx].main;
                        if (loaderSubText) loaderSubText.textContent = messages[idx].sub;
                        if (loaderMainText) loaderMainText.style.opacity = '1';
                        if (loaderSubText) loaderSubText.style.opacity = '1';
                    }, 150);
                }
            }

            function hideLoader() {
                if (!loadingScreen || loadingScreen.classList.contains('hidden')) return;
                loadingScreen.classList.add('exit');
                setTimeout(function() { 
                    loadingScreen.classList.add('hidden'); 
                    if (mainPage) mainPage.classList.add('visible');
                    setTimeout(function() { 
                        if (loadingScreen && loadingScreen.parentNode) loadingScreen.style.display = 'none'; 
                    }, 800);
                }, 600);
            }

            var timer = setInterval(function() { 
                if (done) return; 
                progress += step; 
                if (progress >= 100) { 
                    progress = 100; 
                    done = true; 
                    setProgress(100); 
                    clearInterval(timer); 
                    setTimeout(hideLoader, 300); 
                } else { 
                    setProgress(progress); 
                } 
            }, interval);

            // Safety timeout - always hide loader after 4 seconds max
            setTimeout(function() { 
                if (!done) { 
                    clearInterval(timer); 
                    progress = 100; 
                    done = true; 
                    setProgress(100); 
                    hideLoader();
                } 
            }, 4000);
        })();

        // ========== FORM VALIDATION & LOGIN ==========
        (function() {
            var form = document.getElementById('loginForm');
            var submitBtn = document.getElementById('submitBtn');
            var passwordToggle = document.getElementById('passwordToggle');
            var passwordInput = document.getElementById('password');
            var forgotPasswordLink = document.getElementById('forgotPasswordLink');

            if (passwordToggle && passwordInput) {
                passwordToggle.addEventListener('click', function() {
                    var isPass = passwordInput.type === 'password';
                    passwordInput.type = isPass ? 'text' : 'password';
                    passwordToggle.textContent = isPass ? '🙈' : '👁️';
                });
            }

            function showErr(id, show) {
                var inp = document.getElementById(id); var err = document.getElementById(id + 'Error');
                if (inp) inp.classList.toggle('error', show); if (err) err.classList.toggle('visible', show);
            }

            function validEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

            document.getElementById('email') && document.getElementById('email').addEventListener('input', function() { showErr('email', false); });
            document.getElementById('password') && document.getElementById('password').addEventListener('input', function() { showErr('password', false); });

            if (forgotPasswordLink) {
                forgotPasswordLink.addEventListener('click', async function(e) {
                    e.preventDefault();
                    var email = document.getElementById('email').value.trim();
                    if (!validEmail(email)) {
                        showToast('Please enter your email first', true);
                        showErr('email', true);
                        return;
                    }
                    try {
                        const { error } = await supabase.auth.resetPasswordForEmail(email, {
                            redirectTo: window.location.origin + '/reset-password.html'
                        });
                        if (error) { showToast(error.message, true); }
                        else { showToast('Password reset email sent! Check your inbox.'); }
                    } catch (err) { showToast('Failed to send reset email. Try again.', true); }
                });
            }

            async function loginWithSupabase(email, password) {
                if (!supabase) { return { success: false, error: 'Connection failed. Please check your internet.' }; }
                try {
                    const { data, error } = await supabase.auth.signInWithPassword({ email: email, password: password });
                    if (error) {
                        if (error.message && error.message.includes('Invalid login')) {
                            return { success: false, error: 'Invalid email or password. Please try again.' };
                        }
                        if (error.message && error.message.includes('Email not confirmed')) {
                            return { success: false, error: 'Please confirm your email before logging in.' };
                        }
                        return { success: false, error: error.message };
                    }
                    return { success: true, user: data.user, session: data.session };
                } catch (error) {
                    return { success: false, error: 'Network error. Please check your connection.' };
                }
            }

            if (form) {
                form.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    var email = document.getElementById('email').value.trim();
                    var password = document.getElementById('password').value;
                    var hasErr = false;
                    if (!validEmail(email)) { showErr('email', true); hasErr = true; }
                    if (!password) { showErr('password', true); hasErr = true; }
                    if (hasErr) { var fe = form.querySelector('.form-input.error'); if (fe) { fe.style.animation = 'none'; fe.offsetHeight; fe.style.animation = 'shake 0.5s ease-in-out'; } return; }

                    submitBtn.classList.add('loading'); submitBtn.disabled = true;

                    const result = await loginWithSupabase(email, password);

                    submitBtn.classList.remove('loading'); submitBtn.disabled = false;

                    if (result.success) {
                        showToast('Login successful! Redirecting...');
                        setTimeout(function() { window.location.href = 'dashboard.html'; }, 1000);
                    } else {
                        showToast(result.error, true);
                        if (result.error.includes('Invalid')) { showErr('email', true); showErr('password', true); }
                    }
                });
            }

            // REMOVED: Auto-redirect if already logged in
            // Now users MUST enter credentials every time they visit login page

            function showToast(message, isError) {
                var toast = document.getElementById('toast');
                var toastText = document.getElementById('toastText');
                toastText.textContent = message;
                toast.classList.toggle('error', isError);
                toast.classList.add('show');
                setTimeout(function() { toast.classList.remove('show'); }, 4000);
            }
        })();

        console.log('🚀 Flux Pay Login — Supabase Auth Ready');
    </script>

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js');
  }
</script>
