        this.x = Math.random() * canvas.width;

    update() {
        this.y -= this.speedY;

        ctx.shadowColor = 'rgba(' + this.color + ',0.8)';
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

function renderStars() {

    s += '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>';
    s += '</svg>';
    return s + s + s + s + s;
}

function renderEarner(earner) {
    var stars = renderStars();
    var html = '<div class="earner-card">';
    html += '<div class="earner-top">';
    html += '<div class="earner-left">';
    html += '<div class="earner-avatar"><span style="color:' + earner.color + '">' + earner.initials + '</span></div>';

}
