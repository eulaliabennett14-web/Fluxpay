<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - FairMonie Pay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f1a0f;
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
            padding-bottom: 20px;
        }

        /* ========== GLOWING AURORA BACKGROUND ========== */
        .aurora-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .aurora-wave {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            opacity: 0.1;
            animation: aurora-rotate 25s linear infinite;
        }

        .aurora-wave:nth-child(1) {
            background: radial-gradient(ellipse at 30% 50%, rgba(34, 197, 94, 0.08) 0%, transparent 60%);
            animation-duration: 30s;
        }

        .aurora-wave:nth-child(2) {
            background: radial-gradient(ellipse at 70% 50%, rgba(74, 222, 128, 0.06) 0%, transparent 60%);
            animation-duration: 35s;
            animation-direction: reverse;
        }

        .aurora-wave:nth-child(3) {
            background: radial-gradient(ellipse at 50% 80%, rgba(34, 197, 94, 0.05) 0%, transparent 50%);
            animation-duration: 40s;
        }

        @keyframes aurora-rotate {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* ========== FLOATING PARTICLES ========== */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* ========== HEADER ========== */
        .header {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px 12px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #22c55e;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.2);
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
        }

        .header-title h1 {
            font-size: 20px;
            font-weight: 700;
            color: white;
        }

        .header-title p {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
        }

        .header-right {
            position: relative;
        }

        .bell-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #22c55e;
            position: relative;
        }

        .bell-btn svg {
            width: 20px;
            height: 20px;
        }

        .bell-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 18px;
            height: 18px;
            background: #dc2626;
            border-radius: 50%;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #0f1a0f;
        }

        /* ========== STATS CARD ========== */
        .stats-card {
            position: relative;
            z-index: 2;
            margin: 0 16px 16px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
        }

        .stat-value.credits { color: #22c55e; }
        .stat-value.total { color: #ffffff; }
        .stat-value.debits { color: #fbbf24; }

        .stat-label {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            font-weight: 500;
        }

        .stat-divider {
            width: 1px;
            height: 40px;
            background: rgba(255,255,255,0.08);
        }

        /* ========== FILTER TABS ========== */
        .filter-tabs {
            position: relative;
            z-index: 2;
            display: flex;
            gap: 8px;
            padding: 0 16px;
            margin-bottom: 16px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .filter-tabs::-webkit-scrollbar {
            display: none;
        }

        .filter-tab {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.02);
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            font-family: inherit;
        }

        .filter-tab.active {
            background: rgba(34, 197, 94, 0.15);
            border-color: rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }

        .filter-tab:hover:not(.active) {
            background: rgba(255,255,255,0.05);
        }

        /* ========== NOTIFICATIONS LIST ========== */
        .notifications-list {
            position: relative;
            z-index: 2;
            padding: 0 16px;
        }

        .notification-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 16px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            margin-bottom: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .notification-item:hover {
            background: rgba(34, 197, 94, 0.05);
            border-color: rgba(34, 197, 94, 0.15);
        }

        .notification-item.unread {
            border-left: 3px solid #22c55e;
        }

        .notification-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .notification-icon.bonus { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .notification-icon.earned { background: rgba(74, 222, 128, 0.1); color: #4ade80; }
        .notification-icon.checkin { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .notification-icon.withdraw { background: rgba(251, 191, 36, 0.1); color: #fbbf24; }
        .notification-icon.loan { background: rgba(220, 38, 38, 0.1); color: #dc2626; }
        .notification-icon.referral { background: rgba(192, 132, 252, 0.1); color: #c084fc; }
        .notification-icon.topup { background: rgba(96, 165, 250, 0.1); color: #60a5fa; }
        .notification-icon.system { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.6); }

        .notification-icon svg {
            width: 22px;
            height: 22px;
        }

        .notification-content {
            flex: 1;
            min-width: 0;
        }

        .notification-title {
            font-size: 14px;
            font-weight: 600;
            color: white;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .notification-dot {
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .notification-message {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            line-height: 1.4;
            margin-bottom: 6px;
        }

        .notification-meta {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .notification-time {
            font-size: 11px;
            color: rgba(255,255,255,0.35);
        }

        .notification-amount {
            font-size: 12px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 8px;
        }

        .notification-amount.credit {
            color: #22c55e;
            background: rgba(34, 197, 94, 0.1);
        }

        .notification-amount.debit {
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
        }

        /* ========== EMPTY STATE ========== */
        .empty-state {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: rgba(34, 197, 94, 0.05);
            border: 1px solid rgba(34, 197, 94, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .empty-icon svg {
            width: 36px;
            height: 36px;
            color: #22c55e;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 18px;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
        }

        .empty-text {
            font-size: 14px;
            color: rgba(255,255,255,0.4);
            max-width: 260px;
        }

        /* ========== SECURITY BADGE ========== */
        .security-badge {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 20px 16px;
            padding: 12px;
            background: rgba(34, 197, 94, 0.05);
            border: 1px solid rgba(34, 197, 94, 0.1);
            border-radius: 24px;
        }

        .security-badge svg {
            width: 16px;
            height: 16px;
            color: #22c55e;
        }

        .security-badge span {
            font-size: 12px;
            color: #22c55e;
            font-weight: 500;
        }

        /* ========== MARK ALL READ BUTTON ========== */
        .mark-all-btn {
            position: relative;
            z-index: 2;
            display: block;
            width: calc(100% - 32px);
            margin: 0 16px 16px;
            padding: 14px;
            background: linear-gradient(145deg, #16a34a, #22c55e);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }

        .mark-all-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
        }

        .mark-all-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ========== RESPONSIVE ========== */
        @media (min-width: 768px) {
            .stats-card, .notifications-list, .filter-tabs, .security-badge {
                max-width: 500px;
                margin-left: auto;
                margin-right: auto;
            }
            .mark-all-btn {
                max-width: 500px;
                margin-left: auto;
                margin-right: auto;
            }
        }
    </style>
</head>
<body>

    <!-- Aurora Background -->
    <div class="aurora-bg">
        <div class="aurora-wave"></div>
        <div class="aurora-wave"></div>
        <div class="aurora-wave"></div>
    </div>

    <!-- Floating Particles Canvas -->
    <canvas id="particles-canvas"></canvas>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <button class="back-btn" onclick="goBack()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
            <div class="header-title">
                <h1>Notifications</h1>
                <p>Your activity history</p>
            </div>
        </div>
        <div class="header-right">
            <div class="bell-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                <span class="bell-badge" id="unreadCount">0</span>
            </div>
        </div>
    </header>

    <!-- Stats Card -->
    <div class="stats-card">
        <div class="stat-item">
            <div class="stat-value credits" id="creditsCount">0</div>
            <div class="stat-label">Credits</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
            <div class="stat-value total" id="totalCount">0</div>
            <div class="stat-label">Total</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
            <div class="stat-value debits" id="debitsCount">0</div>
            <div class="stat-label">Debits</div>
        </div>
    </div>

    <!-- Filter Tabs -->
    <div class="filter-tabs">
        <button class="filter-tab active" onclick="filterNotifications('all')">All</button>
        <button class="filter-tab" onclick="filterNotifications('bonus')">Bonus</button>
        <button class="filter-tab" onclick="filterNotifications('earned')">Earned</button>
        <button class="filter-tab" onclick="filterNotifications('checkin')">Check-ins</button>
        <button class="filter-tab" onclick="filterNotifications('withdraw')">Withdraw</button>
        <button class="filter-tab" onclick="filterNotifications('loan')">Loan</button>
    </div>

    <!-- Mark All Read Button -->
    <button class="mark-all-btn" id="markAllBtn" onclick="markAllRead()">Mark All as Read</button>

    <!-- Notifications List -->
    <div class="notifications-list" id="notificationsList"></div>

    <!-- Security Badge -->
    <div class="security-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <span>All transactions are encrypted</span>
    </div>

    <script>
        // ========== FLOATING PARTICLES ==========
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = Math.random() * 3 + 1;
                this.speedY = Math.random() * 0.6 + 0.2;
                this.speedX = (Math.random() - 0.5) * 0.2;
                this.opacity = Math.random() * 0.5 + 0.3;
                this.glow = Math.random() * 20 + 15;
                this.pulseSpeed = Math.random() * 0.02 + 0.01;
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.color = Math.random() > 0.5 ? '34, 197, 94' : '74, 222, 128';
            }
            update() {
                this.y -= this.speedY;
                this.x += this.speedX;
                this.pulsePhase += this.pulseSpeed;
                if (this.y < -50) this.reset();
            }
            draw() {
                const pulse = Math.sin(this.pulsePhase) * 0.3 + 0.7;
                const currentGlow = this.glow * pulse;
                const currentOpacity = this.opacity * pulse;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color}, ${currentOpacity * 0.15})`;
                ctx.shadowBlur = currentGlow;
                ctx.shadowColor = `rgba(${this.color}, 0.6)`;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 1.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color}, ${currentOpacity * 0.4})`;
                ctx.shadowBlur = currentGlow * 0.5;
                ctx.shadowColor = `rgba(${this.color}, 0.8)`;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color}, ${currentOpacity})`;
                ctx.shadowBlur = currentGlow * 0.3;
                ctx.shadowColor = `rgba(${this.color}, 1)`;
                ctx.fill();

                ctx.shadowBlur = 0;
            }
        }

        for (let i = 0; i < 60; i++) {
            const p = new Particle();
            p.y = Math.random() * canvas.height;
            particles.push(p);
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ========== LOCAL STORAGE KEYS ==========
        function getEmailKey(baseKey) {
            const email = localStorage.getItem('fairmonie_user_email') || 'default';
            return 'fairmonie_' + email + '_' + baseKey;
        }

        function loadData(key, fallback) {
            const val = localStorage.getItem(getEmailKey(key));
            return val !== null ? val : fallback;
        }

        function saveData(key, value) {
            localStorage.setItem(getEmailKey(key), value);
        }

        // ========== NOTIFICATION SYSTEM ==========
        // Load existing notifications or create defaults
        let notifications = JSON.parse(loadData('notifications', '[]'));

        // If no notifications exist, create sample ones from user data
        if (notifications.length === 0) {
            const balance = parseInt(loadData('balance', '0'));
            const earned = parseInt(loadData('earned', '0'));
            const checkins = parseInt(loadData('checkins', '0'));
            const lastCheckIn = loadData('lastcheckin', '');

            // Add check-in notifications
            for (let i = 0; i < checkins; i++) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                notifications.push({
                    id: Date.now() + i,
                    type: 'checkin',
                    title: 'Daily Check-in Reward',
                    message: 'You checked in and earned your daily reward. Keep coming back!',
                    amount: '+₦500',
                    amountType: 'credit',
                    time: date.toISOString(),
                    read: i > 0
                });
            }

            // Add earned notification if earned > 0
            if (earned > 0) {
                notifications.push({
                    id: Date.now() + 100,
                    type: 'earned',
                    title: 'Earnings Updated',
                    message: 'Your total earnings have been updated. You are doing great!',
                    amount: '+₦' + earned.toLocaleString(),
                    amountType: 'credit',
                    time: new Date().toISOString(),
                    read: false
                });
            }

            // Add welcome notification
            notifications.push({
                id: Date.now() + 200,
                type: 'system',
                title: 'Welcome to FairMoniePay',
                message: 'Thank you for joining FairMoniePay. Start earning today!',
                amount: '',
                amountType: '',
                time: new Date().toISOString(),
                read: false
            });

            saveData('notifications', JSON.stringify(notifications));
        }

        // ========== ADD NEW NOTIFICATION (called from other pages) ==========
        function addNotification(type, title, message, amount, amountType) {
            const notif = {
                id: Date.now(),
                type: type,
                title: title,
                message: message,
                amount: amount,
                amountType: amountType || 'credit',
                time: new Date().toISOString(),
                read: false
            };
            notifications.unshift(notif);
            saveData('notifications', JSON.stringify(notifications));
            renderNotifications();
            updateStats();
        }

        // Make it globally available for other pages
        window.addNotification = addNotification;

        // ========== RENDER NOTIFICATIONS ==========
        function renderNotifications(filterType) {
            const list = document.getElementById('notificationsList');
            let filtered = notifications;

            if (filterType && filterType !== 'all') {
                filtered = notifications.filter(n => n.type === filterType);
            }

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/>
                                <polyline points="12 6 12 12 16 14"/>
                            </svg>
                        </div>
                        <div class="empty-title">No Notifications Yet</div>
                        <div class="empty-text">Your activity notifications will appear here</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = filtered.map(n => {
                const timeAgo = getTimeAgo(n.time);
                const iconSvg = getIconSvg(n.type);
                return `
                    <div class="notification-item ${n.read ? '' : 'unread'}" data-id="${n.id}" onclick="markRead(${n.id})">
                        <div class="notification-delete-hint">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"/>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                            </svg>
                        </div>
                        <div class="notification-icon ${n.type}">
                            ${iconSvg}
                        </div>
                        <div class="notification-content">
                            <div class="notification-title">
                                ${n.title}
                                ${n.read ? '' : '<span class="notification-dot"></span>'}
                            </div>
                            <div class="notification-message">${n.message}</div>
                            <div class="notification-meta">
                                <span class="notification-time">${timeAgo}</span>
                                ${n.amount ? `<span class="notification-amount ${n.amountType}">${n.amount}</span>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getIconSvg(type) {
            const icons = {
                bonus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13"/><path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/></svg>',
                earned: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>',
                checkin: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
                withdraw: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
                loan: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>',
                referral: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
                topup: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
                system: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
            };
            return icons[type] || icons.system;
        }

        function getTimeAgo(timeStr) {
            const date = new Date(timeStr);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);

            if (diff < 60) return 'Just now';
            if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
            if (diff < 86400) return Math.floor(diff / 3600) + ' hours ago';
            if (diff < 604800) return Math.floor(diff / 86400) + ' days ago';
            return date.toLocaleDateString();
        }

        // ========== MARK READ ==========
        function markRead(id) {
            const notif = notifications.find(n => n.id === id);
            if (notif) {
                notif.read = true;
                saveData('notifications', JSON.stringify(notifications));
                renderNotifications(currentFilter);
                updateStats();
            }
        }

        function markAllRead() {
            notifications.forEach(n => n.read = true);
            saveData('notifications', JSON.stringify(notifications));
            renderNotifications(currentFilter);
            updateStats();
        }

        // ========== FILTER ==========
        let currentFilter = 'all';

        function filterNotifications(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            renderNotifications(type);
        }

        // ========== STATS ==========
        function updateStats() {
            const unread = notifications.filter(n => !n.read).length;
            const credits = notifications.filter(n => n.amountType === 'credit').length;
            const debits = notifications.filter(n => n.amountType === 'debit').length;

            document.getElementById('unreadCount').textContent = unread;
            document.getElementById('creditsCount').textContent = credits;
            document.getElementById('totalCount').textContent = notifications.length;
            document.getElementById('debitsCount').textContent = debits;

            // Hide badge if no unread
            document.getElementById('unreadCount').style.display = unread > 0 ? 'flex' : 'none';

            // Disable mark all button if all read
            document.getElementById('markAllBtn').disabled = unread === 0;
        }

        // ========== GO BACK ==========
        function goBack() {
            window.location.href = 'dashboard.html';
        }

        // ========== SWIPE TO DELETE ==========
        function initSwipeToDelete() {
            const list = document.getElementById('notificationsList');
            if (!list) return;

            let startX = 0;
            let currentX = 0;
            let isSwiping = false;
            let currentItem = null;

            list.addEventListener('touchstart', function(e) {
                const item = e.target.closest('.notification-item');
                if (!item) return;

                startX = e.touches[0].clientX;
                currentItem = item;
                isSwiping = true;
                item.classList.add('swiping');
            }, { passive: true });

            list.addEventListener('touchmove', function(e) {
                if (!isSwiping || !currentItem) return;

                currentX = e.touches[0].clientX;
                const diff = currentX - startX;

                // Only allow left swipe (negative diff)
                if (diff < 0) {
                    currentItem.style.transform = 'translateX(' + diff + 'px)';

                    // Show delete hint if swiped enough
                    if (Math.abs(diff) > 60) {
                        currentItem.classList.add('delete-ready');
                    } else {
                        currentItem.classList.remove('delete-ready');
                    }
                }
            }, { passive: true });

            list.addEventListener('touchend', function(e) {
                if (!isSwiping || !currentItem) return;

                const diff = currentX - startX;
                const item = currentItem;

                item.classList.remove('swiping');

                // If swiped enough, delete
                if (Math.abs(diff) > 80) {
                    item.classList.add('deleting');

                    setTimeout(() => {
                        const id = parseInt(item.dataset.id);
                        deleteNotification(id);
                    }, 300);
                } else {
                    // Snap back
                    item.style.transform = '';
                    item.classList.remove('delete-ready');
                }

                isSwiping = false;
                currentItem = null;
                startX = 0;
                currentX = 0;
            });

            // Mouse support for desktop testing
            list.addEventListener('mousedown', function(e) {
                const item = e.target.closest('.notification-item');
                if (!item) return;

                startX = e.clientX;
                currentItem = item;
                isSwiping = true;
                item.classList.add('swiping');
            });

            list.addEventListener('mousemove', function(e) {
                if (!isSwiping || !currentItem) return;

                currentX = e.clientX;
                const diff = currentX - startX;

                if (diff < 0) {
                    currentItem.style.transform = 'translateX(' + diff + 'px)';

                    if (Math.abs(diff) > 60) {
                        currentItem.classList.add('delete-ready');
                    } else {
                        currentItem.classList.remove('delete-ready');
                    }
                }
            });

            list.addEventListener('mouseup', function(e) {
                if (!isSwiping || !currentItem) return;

                const diff = currentX - startX;
                const item = currentItem;

                item.classList.remove('swiping');

                if (Math.abs(diff) > 80) {
                    item.classList.add('deleting');

                    setTimeout(() => {
                        const id = parseInt(item.dataset.id);
                        deleteNotification(id);
                    }, 300);
                } else {
                    item.style.transform = '';
                    item.classList.remove('delete-ready');
                }

                isSwiping = false;
                currentItem = null;
                startX = 0;
                currentX = 0;
            });

            list.addEventListener('mouseleave', function() {
                if (currentItem) {
                    currentItem.classList.remove('swiping');
                    currentItem.style.transform = '';
                    currentItem.classList.remove('delete-ready');
                    isSwiping = false;
                    currentItem = null;
                }
            });
        }

        // ========== DELETE NOTIFICATION ==========
        function deleteNotification(id) {
            notifications = notifications.filter(n => n.id !== id);
            saveData('notifications', JSON.stringify(notifications));
            renderNotifications(currentFilter);
            updateStats();
        }

        // ========== INIT ==========
        renderNotifications();
        updateStats();
        initSwipeToDelete();
    </script>

</body>
