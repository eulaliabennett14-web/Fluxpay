<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Bonus - FairMonie Pay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f1a0f; color: white; overflow: hidden; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .aurora-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .aurora-wave { position: absolute; width: 200%; height: 200%; top: -50%; left: -50%; opacity: 0.1; animation: aurora-rotate 25s linear infinite; }
        .aurora-wave:nth-child(1) { background: radial-gradient(ellipse at 30% 50%, rgba(34,197,94,0.08) 0%, transparent 60%); animation-duration: 30s; }
        .aurora-wave:nth-child(2) { background: radial-gradient(ellipse at 70% 50%, rgba(74,222,128,0.06) 0%, transparent 60%); animation-duration: 35s; animation-direction: reverse; }
        .aurora-wave:nth-child(3) { background: radial-gradient(ellipse at 50% 80%, rgba(34,197,94,0.05) 0%, transparent 50%); animation-duration: 40s; }
        @keyframes aurora-rotate { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.1); } 100% { transform: rotate(360deg) scale(1); } }
        #particles-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .modal-container { position: relative; z-index: 10; width: 90%; max-width: 400px; background: rgba(15,26,15,0.95); border: 1px solid rgba(34,197,94,0.15); border-radius: 28px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(34,197,94,0.1); backdrop-filter: blur(20px); }
        .modal-header { background: linear-gradient(135deg, #16a34a, #22c55e); padding: 20px; text-align: center; position: relative; }
        .modal-header-text { font-size: 18px; font-weight: 700; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .modal-header-text svg { width: 20px; height: 20px; }
        .modal-close { position: absolute; top: 16px; right: 16px; width: 32px; height: 32px; background: rgba(255,255,255,0.2); border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; font-size: 20px; transition: all 0.3s; }
        .modal-close:hover { background: rgba(255,255,255,0.3); }
        .modal-body { padding: 32px 24px; text-align: center; }
        .gift-icon { width: 80px; height: 80px; margin: 0 auto 20px; background: rgba(34,197,94,0.1); border: 2px solid rgba(34,197,94,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: gift-pulse 2s ease-in-out infinite; }
        @keyframes gift-pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(34,197,94,0.2); } 50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(34,197,94,0.4); } }
        .gift-icon svg { width: 40px; height: 40px; color: #22c55e; }
        .bonus-title { font-size: 22px; font-weight: 700; color: white; margin-bottom: 8px; }
        .bonus-amount { font-size: 42px; font-weight: 800; color: #22c55e; margin-bottom: 8px; letter-spacing: -1px; }
        .bonus-desc { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 28px; }
        .modal-buttons { display: flex; gap: 12px; }
        .btn { flex: 1; padding: 16px; border-radius: 16px; border: none; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; }
        .btn-cancel { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); }
        .btn-cancel:hover { background: rgba(255,255,255,0.1); }
        .btn-claim { background: linear-gradient(145deg, #16a34a, #22c55e); color: white; box-shadow: 0 4px 20px rgba(34,197,94,0.3); }
        .btn-claim:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(34,197,94,0.4); }
        .processing-screen { display: none; padding: 48px 24px; text-align: center; }
        .processing-screen.active { display: block; }
        .spinner { width: 60px; height: 60px; margin: 0 auto 24px; border: 3px solid rgba(34,197,94,0.2); border-top-color: #22c55e; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .processing-text { font-size: 20px; font-weight: 700; color: white; margin-bottom: 8px; }
        .processing-subtext { font-size: 14px; color: rgba(255,255,255,0.5); }
        .success-screen { display: none; padding: 32px 24px; text-align: center; }
        .success-screen.active { display: block; }
        .success-icon { width: 80px; height: 80px; margin: 0 auto 20px; background: rgba(34,197,94,0.1); border: 2px solid rgba(34,197,94,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: success-pop 0.5s cubic-bezier(0.34,1.56,0.64,1); }
        @keyframes success-pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        .success-icon svg { width: 40px; height: 40px; color: #22c55e; }
        .success-title { font-size: 24px; font-weight: 800; color: white; margin-bottom: 8px; }
        .success-message { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 8px; }
        .success-amount { font-size: 36px; font-weight: 800; color: #22c55e; margin-bottom: 24px; }
        .btn-continue { width: 100%; padding: 18px; background: linear-gradient(145deg, #16a34a, #22c55e); color: white; border: none; border-radius: 16px; font-family: inherit; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 20px rgba(34,197,94,0.3); transition: all 0.3s; }
        .btn-continue:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(34,197,94,0.4); }
        .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; overflow: hidden; }
        .confetti-piece { position: absolute; width: 10px; height: 10px; top: -10px; animation: confetti-fall 3s ease-out forwards; }
        @keyframes confetti-fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
        .claim-screen.hidden { display: none; }
        .wait-screen { display: none; padding: 32px 24px; text-align: center; }
        .wait-screen.active { display: block; }
        .wait-icon { width: 80px; height: 80px; margin: 0 auto 20px; background: rgba(251,191,36,0.1); border: 2px solid rgba(251,191,36,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .wait-icon svg { width: 40px; height: 40px; color: #fbbf24; }
        .wait-title { font-size: 22px; font-weight: 700; color: white; margin-bottom: 8px; }
        .wait-message { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 24px; }
        .wait-timer { font-size: 18px; color: #fbbf24; font-weight: 700; margin-bottom: 24px; }
        .btn-wait { width: 100%; padding: 18px; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; font-family: inherit; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .btn-wait:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <!-- Aurora Background -->
    <div class="aurora-bg"><div class="aurora-wave"></div><div class="aurora-wave"></div><div class="aurora-wave"></div></div>

    <!-- Floating Particles Canvas -->
    <canvas id="particles-canvas"></canvas>

    <!-- Confetti Container -->
    <div class="confetti-container" id="confettiContainer"></div>

    <!-- Modal -->
    <div class="modal-container">
        <!-- Header -->
        <div class="modal-header">
            <div class="modal-header-text">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                Claim Your Bonus
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            </div>
            <button class="modal-close" onclick="goBack()">&times;</button>
        </div>

        <!-- Claim Screen -->
        <div class="claim-screen" id="claimScreen">
            <div class="modal-body">
                <div class="gift-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5" rx="1"/><line x1="12" y1="22" x2="12" y2="7"/>
                        <path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>
                    </svg>
                </div>
                <div class="bonus-title" id="bonusTitle">Welcome Bonus</div>
                <div class="bonus-amount" id="bonusAmount">₦250,000</div>
                <div class="bonus-desc" id="bonusDesc">Your one-time welcome gift!</div>
                <div class="modal-buttons">
                    <button class="btn btn-cancel" onclick="goBack()">Cancel</button>
                    <button class="btn btn-claim" onclick="claimBonus()">Claim Now</button>
                </div>
            </div>
        </div>

        <!-- Wait Screen -->
        <div class="wait-screen" id="waitScreen">
            <div class="modal-body">
                <div class="wait-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                    </svg>
                </div>
                <div class="wait-title">Bonus Already Claimed!</div>
                <div class="wait-message">You can claim your next daily bonus in:</div>
                <div class="wait-timer" id="waitTimer">24:00:00</div>
                <button class="btn-wait" onclick="goBack()">Go Back</button>
            </div>
        </div>

        <!-- Processing Screen -->
        <div class="processing-screen" id="processingScreen">
            <div class="spinner"></div>
            <div class="processing-text">Processing your bonus...</div>
            <div class="processing-subtext">Please wait</div>
        </div>

        <!-- Success Screen -->
        <div class="success-screen" id="successScreen">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="success-title">Success! 🎉</div>
            <div class="success-message" id="successMessage">Welcome bonus credited!</div>
            <div class="success-amount" id="successAmount">+₦250,000</div>
            <button class="btn-continue" onclick="continueToDashboard()">Continue</button>
        </div>
    </div>

    <script>
        // ========== FLOATING PARTICLES ==========
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = Math.random() * 3 + 1;
                this.speedY = Math.random() * 0.6 + 0.2;
                this.speedX = (Math.random() - 0.5) * 0.2;
                this.opacity = Math.random() * 0.5 + 0.3;
                this.glow = Math.random() * 20 + 15;
                this.pulseSpeed = Math.random() * 0.02 + 0.01;
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.color = Math.random() > 0.5 ? '34, 197, 94' : '74, 222, 128';
            }
            update() {
                this.y -= this.speedY;
                this.x += this.speedX;
                this.pulsePhase += this.pulseSpeed;
                if (this.y < -50) {
                    this.reset();
                }
            }
            draw() {
                const pulse = Math.sin(this.pulsePhase) * 0.3 + 0.7;
                const currentGlow = this.glow * pulse;
                const currentOpacity = this.opacity * pulse;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color}, ${currentOpacity * 0.15})`;
                ctx.shadowBlur = currentGlow;
                ctx.shadowColor = `rgba(${this.color}, 0.6)`;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 1.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color}, ${currentOpacity * 0.4})`;
                ctx.shadowBlur = currentGlow * 0.5;
                ctx.shadowColor = `rgba(${this.color}, 0.8)`;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color}, ${currentOpacity})`;
                ctx.shadowBlur = currentGlow * 0.3;
                ctx.shadowColor = `rgba(${this.color}, 1)`;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        for (let i = 0; i < 60; i++) {
            const p = new Particle();
            p.y = Math.random() * canvas.height;
            particles.push(p);
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ========== EMAIL-SPECIFIC STORAGE ==========
        function getKey(base) {
            const email = localStorage.getItem('fairmonie_user_email') || 'default';
            return 'fairmonie_' + email + '_' + base;
        }

        const LS_KEYS = {
            get BALANCE() { return getKey('balance'); },
            get EARNED() { return getKey('earned'); },
            get BONUS_CLAIMED() { return getKey('bonus_claimed'); },
            get LAST_BONUS_DATE() { return getKey('last_bonus_date'); }
        };

        const FIRST_BONUS = 250000;
        const DAILY_BONUS = 25000;
        const HOURS_24 = 24 * 60 * 60 * 1000;

        let bonusClaimed = localStorage.getItem(LS_KEYS.BONUS_CLAIMED) === 'true';
        let lastBonusDate = localStorage.getItem(LS_KEYS.LAST_BONUS_DATE);
        let currentBonusAmount = FIRST_BONUS;
        let isDailyBonus = false;
        let currentBalance = 0;
        let earnedAmount = 0;

        function checkBonusStatus() {
            const now = new Date().getTime();

            if (!bonusClaimed) {
                currentBonusAmount = FIRST_BONUS;
                isDailyBonus = false;
                document.getElementById('bonusTitle').textContent = 'Welcome Bonus';
                document.getElementById('bonusAmount').innerHTML = '₦' + FIRST_BONUS.toLocaleString();
                document.getElementById('bonusDesc').textContent = 'Your one-time welcome gift!';
                document.getElementById('successMessage').textContent = 'Welcome bonus credited!';
                document.getElementById('successAmount').innerHTML = '+₦' + FIRST_BONUS.toLocaleString();
            } else if (lastBonusDate) {
                const lastDate = parseInt(lastBonusDate);
                const timeDiff = now - lastDate;

                if (timeDiff >= HOURS_24) {
                    currentBonusAmount = DAILY_BONUS;
                    isDailyBonus = true;
                    document.getElementById('bonusTitle').textContent = 'Daily Bonus';
                    document.getElementById('bonusAmount').innerHTML = '₦' + DAILY_BONUS.toLocaleString();
                    document.getElementById('bonusDesc').textContent = 'Your daily reward! Come back every 24 hours.';
                    document.getElementById('successMessage').textContent = 'Daily bonus credited!';
                    document.getElementById('successAmount').innerHTML = '+₦' + DAILY_BONUS.toLocaleString();
                } else {
                    const remaining = HOURS_24 - timeDiff;
                    showWaitScreen(remaining);
                }
            }
        }

        function showWaitScreen(remainingMs) {
            document.getElementById('claimScreen').classList.add('hidden');
            document.getElementById('waitScreen').classList.add('active');
            updateTimer(remainingMs);
            let timerInterval = setInterval(() => {
                remainingMs -= 1000;
                if (remainingMs > 0) {
                    updateTimer(remainingMs);
                } else {
                    clearInterval(timerInterval);
                    window.location.reload();
                }
            }, 1000);
        }

        function updateTimer(ms) {
            const hours = Math.floor(ms / (1000 * 60 * 60));
            const minutes = Math.floor((ms % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((ms % (1000 * 60)) / 1000);
            document.getElementById('waitTimer').textContent = 
                String(hours).padStart(2, '0') + ':' + 
                String(minutes).padStart(2, '0') + ':' + 
                String(seconds).padStart(2, '0');
        }

        function claimBonus() {
            document.getElementById('claimScreen').classList.add('hidden');
            document.getElementById('processingScreen').classList.add('active');
            playProcessingSound();

            setTimeout(() => {
                document.getElementById('processingScreen').classList.remove('active');
                document.getElementById('successScreen').classList.add('active');
                createConfetti();
                playSuccessSound();

                // Load current values from email-specific storage
                currentBalance = parseInt(localStorage.getItem(LS_KEYS.BALANCE) || '0');
                earnedAmount = parseInt(localStorage.getItem(LS_KEYS.EARNED) || '0');
                
                // Add bonus
                currentBalance += currentBonusAmount;
                earnedAmount += currentBonusAmount;
                
                // Save to email-specific storage
                localStorage.setItem(LS_KEYS.BALANCE, currentBalance.toString());
                localStorage.setItem(LS_KEYS.EARNED, earnedAmount.toString());
                localStorage.setItem(LS_KEYS.BONUS_CLAIMED, 'true');
                localStorage.setItem(LS_KEYS.LAST_BONUS_DATE, new Date().getTime().toString());

                // Update success screen with correct amount
                document.getElementById('successAmount').innerHTML = '+₦' + currentBonusAmount.toLocaleString();
            }, 4000);
        }

        function goBack() {
            window.location.href = 'dashboard.html';
        }

        function continueToDashboard() {
            window.location.href = 'dashboard.html';
        }

        // ========== CONFETTI ==========
        function createConfetti() {
            const container = document.getElementById('confettiContainer');
            const colors = ['#22c55e', '#4ade80', '#16a34a', '#86efac', '#bbf7d0', '#fcd34d', '#fbbf24'];
            for (let i = 0; i < 50; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                piece.style.animationDelay = Math.random() * 2 + 's';
                piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
                piece.style.width = (Math.random() * 8 + 4) + 'px';
                piece.style.height = (Math.random() * 8 + 4) + 'px';
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                container.appendChild(piece);
            }
        }

        // ========== SOUNDS ==========
        function playProcessingSound() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.frequency.setValueAtTime(600, audioContext.currentTime);
                oscillator.frequency.linearRampToValueAtTime(800, audioContext.currentTime + 0.5);
                gainNode.gain.setValueAtTime(0.05, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.5);
                oscillator.type = 'sine';
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.5);
            } catch (e) {}
        }

        function playSuccessSound() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const notes = [523, 659, 784, 1047];
                notes.forEach((freq, i) => {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    osc.frequency.setValueAtTime(freq, audioContext.currentTime + i * 0.1);
                    gain.gain.setValueAtTime(0, audioContext.currentTime + i * 0.1);
                    gain.gain.linearRampToValueAtTime(0.1, audioContext.currentTime + i * 0.1 + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + i * 0.1 + 0.8);
                    osc.type = 'sine';
                    osc.start(audioContext.currentTime + i * 0.1);
                    osc.stop(audioContext.currentTime + i * 0.1 + 0.8);
                });
            } catch (e) {}
        }

        // ========== INITIALIZE ==========
        checkBonusStatus();
    </script>
</body>
</html>
