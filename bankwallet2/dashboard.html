<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - Bank Wallet</title>
    <link href="https://fonts.googleapis.com/css2?family=Amaranth:wght@400;700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Amaranth', sans-serif;
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(34, 197, 94, 0.1);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(145deg, #22c55e, #16a34a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: white;
        }

        .header-info h3 {
            font-size: 14px;
            font-weight: 700;
            color: white;
            letter-spacing: 0.3px;
        }

        .header-info p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .header-icon:hover {
            background: rgba(34, 197, 94, 0.2);
        }

        .header-icon svg {
            width: 20px;
            height: 20px;
            color: #22c55e;
        }

        .notification-dot {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            border: 2px solid #0a0a0a;
        }

        /* BALANCE CARD */
        .balance-section {
            padding: 20px 16px 16px;
        }

        .balance-card {
            background: linear-gradient(135deg, #16a34a 0%, #22c55e 50%, #16a34a 100%);
            border-radius: 24px;
            padding: 28px 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(34, 197, 94, 0.3);
        }

        .balance-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-10%, 10%); }
        }

        .balance-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .balance-label {
            font-size: 14px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .history-link {
            font-size: 12px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: underline;
            cursor: pointer;
            transition: all 0.3s;
        }

        .history-link:hover {
            color: white;
        }

        .balance-amount {
            font-size: 48px;
            font-weight: 900;
            color: white;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            letter-spacing: -1px;
            font-family: 'Amaranth', sans-serif;
        }

        .balance-details {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            position: relative;
            z-index: 1;
        }

        .balance-detail {
            font-size: 13px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.85);
        }

        .balance-detail span {
            color: white;
            font-weight: 900;
        }

        /* BUY MINER ROW */
        .buy-miner-section {
            padding: 0 16px 20px;
        }

        .buy-miner-card {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.1), rgba(22, 163, 74, 0.05));
            border: 1px solid rgba(34, 197, 94, 0.15);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.3s;
        }

        .buy-miner-card:hover {
            background: rgba(34, 197, 94, 0.08);
            border-color: rgba(34, 197, 94, 0.25);
            transform: translateY(-2px);
        }

        .buy-miner-info h4 {
            font-size: 14px;
            font-weight: 700;
            color: #22c55e;
            margin-bottom: 4px;
        }

        .buy-miner-info p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .buy-miner-btn {
            padding: 12px 24px;
            background: #000000;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            font-family: 'Amaranth', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }

        .buy-miner-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        /* ACTION BUTTONS */
        .actions-section {
            padding: 0 16px 20px;
        }

        .action-btn {
            width: 100%;
            padding: 18px;
            background: #22c55e;
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            font-family: 'Amaranth', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.3);
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .action-btn svg {
            width: 22px;
            height: 22px;
        }

        /* HOW IT WORKS */
        .how-section {
            text-align: center;
            padding: 10px 16px 30px;
        }

        .how-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        .how-link:hover {
            color: #22c55e;
        }

        .youtube-badge {
            width: 28px;
            height: 20px;
            background: #ff0000;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .youtube-badge svg {
            width: 14px;
            height: 14px;
            color: white;
        }

        /* BOTTOM ICON */
        .bottom-section {
            text-align: center;
            padding: 20px 16px 100px;
        }

        .bottom-icon {
            width: 80px;
            height: 80px;
            background: #22c55e;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            box-shadow: 0 8px 32px rgba(34, 197, 94, 0.2);
        }

        .bottom-icon svg {
            width: 40px;
            height: 40px;
            color: white;
        }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(34, 197, 94, 0.1);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 20px;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .nav-item.active .nav-icon { color: #22c55e; }
        .nav-item.active .nav-label { color: #22c55e; }

        .nav-icon {
            width: 24px;
            height: 24px;
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.3s;
        }

        .nav-label {
            font-size: 11px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.3s;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #22c55e;
            color: white;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 8px 32px rgba(34, 197, 94, 0.4);
            z-index: 1000;
            opacity: 0;
            transition: all 0.4s;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <div class="header-avatar" id="userAvatar">👤</div>
            <div class="header-info">
                <h3 id="userName">Welcome</h3>
                <p>Bank Wallet</p>
            </div>
        </div>
        <div class="header-icon" onclick="goToNotifications()" style="position: relative;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            <div class="notification-dot" id="notifDot" style="display: none;"></div>
        </div>
    </div>

    <!-- BALANCE CARD -->
    <div class="balance-section">
        <div class="balance-card">
            <div class="balance-header">
                <div class="balance-label">Wallet Balance</div>
                <div class="history-link" onclick="goToHistory()">Transaction history ></div>
            </div>
            <div class="balance-amount" id="balanceAmount">₦0.00</div>
            <div class="balance-details">
                <div class="balance-detail">NAME: <span id="userNameDisplay">Loading...</span></div>
                <div class="balance-detail">Account: <span id="userAccount">Loading...</span></div>
            </div>
        </div>
    </div>

    <!-- BUY MINER -->
    <div class="buy-miner-section">
        <div class="buy-miner-card" onclick="goToBuyMiner()">
            <div class="buy-miner-info">
                <h4>Current Miner: <span id="currentMiner">Free Miner</span></h4>
                <p>Upgrade to earn more daily</p>
            </div>
            <button class="buy-miner-btn">Buy Miner</button>
        </div>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="actions-section">
        <button class="action-btn" onclick="goToMine()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                <line x1="12" y1="22.08" x2="12" y2="12"/>
            </svg>
            Mine
        </button>
        <button class="action-btn" onclick="goToWithdraw()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
                <polyline points="16 6 12 2 8 6"/>
                <line x1="12" y1="2" x2="12" y2="15"/>
            </svg>
            Withdraw
        </button>
    </div>

    <!-- HOW IT WORKS -->
    <div class="how-section">
        <a class="how-link" onclick="window.location.href='how_it_works.html'" style="cursor: pointer;">
            <div class="youtube-badge">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                </svg>
            </div>
            How it works
        </a>
    </div>

    <!-- BOTTOM ICON -->
    <div class="bottom-section">
        <div class="bottom-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11m16-11v11M8 14v3m4-3v3m4-3v3"/>
            </svg>
        </div>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="goToDashboard()">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <span class="nav-label">Home</span>
        </div>
        <div class="nav-item" onclick="goToMine()">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                <line x1="12" y1="22.08" x2="12" y2="12"/>
            </svg>
            <span class="nav-label">Mine</span>
        </div>
        <div class="nav-item" onclick="goToHistory()">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
            </svg>
            <span class="nav-label">History</span>
        </div>
        <div class="nav-item" onclick="goToProfile()">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
            <span class="nav-label">Profile</span>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Load user data
        var userName = localStorage.getItem('bankwallet_name') || 'User';
        var userAccount = localStorage.getItem('bankwallet_account') || '0000000000';
        var balance = parseFloat(localStorage.getItem('bankwallet_balance')) || 0;
        var currentMiner = localStorage.getItem('bankwallet_miner') || 'Free Miner';

        // Update UI
        document.getElementById('userName').textContent = 'Welcome, ' + userName;
        document.getElementById('userAvatar').textContent = userName.charAt(0).toUpperCase();
        document.getElementById('userNameDisplay').textContent = userName.toUpperCase();
        document.getElementById('userAccount').textContent = userAccount;
        document.getElementById('balanceAmount').textContent = '₦' + balance.toLocaleString('en-NG', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('currentMiner').textContent = currentMiner;

            function showToast(msg) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(function() { t.classList.remove('show'); }, 3000);
        }

        function goToDashboard() { window.location.href = 'dashboard.html'; }
        function goToMine() { window.location.href = 'mine.html'; }
        function goToWithdraw() { window.location.href = 'withdraw.html'; }
        function goToHistory() { window.location.href = 'history.html'; }
        function goToBuyMiner() { window.location.href = 'buy_miner.html'; }
        function goToProfile() { window.location.href = 'profile.html'; }
        function goToNotifications() { window.location.href = 'notifications.html'; }
        // How it works link updated to go to how_it_works.html
    </script>
</body>
</html>
