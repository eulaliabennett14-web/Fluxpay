<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bank Wallet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a1628;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .logo-container {
            width: 100px;
            height: 100px;
            background: #22c55e;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
            box-shadow: 0 8px 32px rgba(34, 197, 94, 0.3);
        }

        .logo-container svg {
            width: 50px;
            height: 50px;
            color: white;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        h1 span {
            color: #22c55e;
        }

        .subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
            max-width: 320px;
            margin-bottom: 40px;
        }

        .get-started-btn {
            width: 100%;
            max-width: 280px;
            padding: 18px 32px;
            background: #22c55e;
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.3);
            transition: all 0.3s;
        }

        .get-started-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(34, 197, 94, 0.4);
        }

        .get-started-btn:active {
            transform: scale(0.98);
        }

        .footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
        }

        @media (min-width: 768px) {
            h1 { font-size: 40px; }
            .subtitle { font-size: 18px; max-width: 400px; }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11m16-11v11M8 14v3m4-3v3m4-3v3"/>
        </svg>
    </div>

    <h1>Welcome to <span>Bank Wallet</span></h1>

    <p class="subtitle">
        Join Bank Wallet and start mining ₦86,000 daily. Securely manage your assets and earn effortlessly through our trusted mining platform.
    </p>

    <button class="get-started-btn" onclick="goToSignup()">Get Started</button>

    <div class="footer">
        © 2026 Bank Wallet — Secure. Smart. Seamless.
    </div>

    <script>
        // Check if user already signed up
        if (localStorage.getItem('bankwallet_signed_up') === 'true') {
            window.location.replace('dashboard.html');
        }

        function goToSignup() {
            window.location.href = 'get_started.html';
        }
    </script>
</body>
</html>
