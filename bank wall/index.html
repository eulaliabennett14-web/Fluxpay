<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Wallet - Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Floating Animation for Icon */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(22, 163, 74, 0); }
        }

        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        /* Icon Container */
        .icon-wrapper {
            margin-bottom: 32px;
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }

        .icon-box {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            animation: float 3s ease-in-out infinite, pulse 2s ease-in-out infinite;
            box-shadow: 0 10px 40px rgba(22, 163, 74, 0.3);
        }

        .icon-box svg {
            width: 50px;
            height: 50px;
            fill: white;
        }

        /* Headline */
        .headline {
            margin-bottom: 16px;
            animation: fadeInUp 0.6s ease-out 0.2s forwards;
            opacity: 0;
        }

        .headline h1 {
            font-size: 32px;
            font-weight: 700;
            line-height: 1.2;
            color: #111827;
        }

        .headline .brand {
            color: #16a34a;
        }

        /* Subtext */
        .subtext {
            margin-bottom: 24px;
            animation: fadeInUp 0.6s ease-out 0.4s forwards;
            opacity: 0;
        }

        .subtext p {
            font-size: 16px;
            line-height: 1.6;
            color: #6b7280;
            max-width: 320px;
            margin: 0 auto;
        }

        .subtext .highlight {
            color: #16a34a;
            font-weight: 600;
        }

        /* Trust Bar */
        .trust-bar {
            margin-bottom: 28px;
            animation: fadeInUp 0.6s ease-out 0.5s forwards;
            opacity: 0;
        }

        .stars {
            color: #fbbf24;
            font-size: 18px;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .trust-text {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 10px;
        }

        .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: #16a34a;
            font-weight: 500;
        }

        .security-badge svg {
            width: 14px;
            height: 14px;
            fill: #16a34a;
        }

        /* CTA Button */
        .cta-button {
            width: 100%;
            max-width: 320px;
            padding: 16px 32px;
            background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(22, 163, 74, 0.3);
            animation: fadeInUp 0.6s ease-out 0.6s forwards;
            opacity: 0;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(22, 163, 74, 0.4);
        }

        .cta-button:active {
            transform: scale(0.98);
        }

        /* Login Link */
        .login-link {
            animation: fadeInUp 0.6s ease-out 0.7s forwards;
            opacity: 0;
        }

        .login-link p {
            font-size: 15px;
            color: #6b7280;
        }

        .login-link a {
            color: #16a34a;
            font-weight: 600;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* Step Indicator */
        .steps {
            margin-top: 32px;
            display: flex;
            justify-content: center;
            gap: 8px;
            animation: fadeInUp 0.6s ease-out 0.8s forwards;
            opacity: 0;
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #d1d5db;
            transition: all 0.3s ease;
        }

        .step-dot.active {
            background: #16a34a;
            width: 24px;
            border-radius: 4px;
        }

        .step-label {
            margin-top: 8px;
            font-size: 12px;
            color: #9ca3af;
            animation: fadeInUp 0.6s ease-out 0.9s forwards;
            opacity: 0;
        }

        /* Responsive */
        @media (min-width: 768px) {
            .headline h1 {
                font-size: 36px;
            }
            .icon-box {
                width: 120px;
                height: 120px;
                border-radius: 32px;
            }
            .icon-box svg {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Icon -->
        <div class="icon-wrapper">
            <div class="icon-box">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7v2h20V7L12 2zm0 2.5L18.5 7H5.5L12 4.5zM4 10v10h3V10H4zm6 0v10h3V10h-3zm6 0v10h3V10h-3zM2 22v2h20v-2H2z"/>
                </svg>
            </div>
        </div>

        <!-- Headline -->
        <div class="headline">
            <h1>Welcome to <span class="brand">Bank Wallet</span></h1>
        </div>

        <!-- Subtext -->
        <div class="subtext">
            <p>Join Bank Wallet and start mining <span class="highlight">₦86,000 daily</span>. Securely manage your assets and earn effortlessly through our trusted mining platform.</p>
        </div>

        <!-- Trust Bar -->
        <div class="trust-bar">
            <div class="stars">★★★★★</div>
            <div class="trust-text">Trusted by 10,000+ users</div>
            <div class="security-badge">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
                </svg>
                Bank-grade security
            </div>
        </div>

        <!-- CTA Button -->
        <button class="cta-button" onclick="goToSignup()">Get Started</button>

        <!-- Login Link -->
        <div class="login-link">
            <p>Already have an account? <a href="#" onclick="goToLogin()">Log in</a></p>
        </div>

        <!-- Step Indicator -->
        <div class="steps">
            <div class="step-dot active"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
        </div>
        <div class="step-label">Step 1 of 3</div>
    </div>

    <script>
        // Check if user is already logged in
        (function() {
            const userData = JSON.parse(localStorage.getItem('bankWalletUser') || '{}');
            if (userData.isLoggedIn) {
                // User is logged in, redirect to loading screen then dashboard
                window.location.href = 'loading.html';
                return;
            }
        })();

        function goToSignup() {
            window.location.href = 'signup.html';
        }

        function goToLogin() {
            window.location.href = 'login.html';
        }

        // Add entrance animation on load
        document.addEventListener('DOMContentLoaded', function() {
            document.body.style.opacity = '1';
        });
    </script>
</body>
</html>
