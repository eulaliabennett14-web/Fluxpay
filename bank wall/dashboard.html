<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Wallet - Join Telegram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #ffffff 0%, #f0fdf4 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        /* Telegram Icon */
        .telegram-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #0088cc 0%, #0099ff 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 10px 40px rgba(0, 136, 204, 0.3);
        }

        .telegram-icon svg {
            width: 50px;
            height: 50px;
            fill: white;
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 16px;
            color: #6b7280;
            line-height: 1.5;
            margin-bottom: 32px;
        }

        .benefits {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 32px;
            text-align: left;
        }

        .benefit-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            font-size: 15px;
            color: #374151;
        }

        .benefit-item:last-child {
            margin-bottom: 0;
        }

        .benefit-icon {
            width: 28px;
            height: 28px;
            background: #dbeafe;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .benefit-icon svg {
            width: 16px;
            height: 16px;
            fill: #2563eb;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn-telegram {
            background: linear-gradient(135deg, #0088cc 0%, #0099ff 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3);
        }

        .btn-telegram:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 136, 204, 0.4);
        }

        .btn-continue {
            background: #e5e7eb;
            color: #9ca3af;
            cursor: not-allowed;
        }

        .btn-continue.show {
            background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(22, 163, 74, 0.3);
        }

        .btn-continue.show:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(22, 163, 74, 0.4);
        }

        .skip-link {
            margin-top: 20px;
            font-size: 14px;
            color: #9ca3af;
        }

        .skip-link a {
            color: #6b7280;
            text-decoration: none;
        }

        .steps-container {
            margin-top: 40px;
        }

        .steps {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #d1d5db;
        }

        .step-dot.active {
            background: #16a34a;
            width: 24px;
            border-radius: 4px;
        }

        .step-label {
            font-size: 12px;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Telegram Icon -->
        <div class="telegram-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.479.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
            </svg>
        </div>

        <div class="title">Join Our Telegram!</div>
        <div class="subtitle">Connect with our community and stay updated with the latest news, tips, and exclusive offers.</div>

        <div class="benefits">
            <div class="benefit-item">
                <div class="benefit-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                </div>
                <span>Get instant mining updates</span>
            </div>
            <div class="benefit-item">
                <div class="benefit-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                </div>
                <span>Exclusive bonus announcements</span>
            </div>
            <div class="benefit-item">
                <div class="benefit-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                </div>
                <span>24/7 community support</span>
            </div>
        </div>

        <div class="button-group">
            <a href="https://t.me/+IT4eMfdzffZkOGQ0" target="_blank" class="btn btn-telegram" onclick="joinedTelegram()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                    <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.479.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
                </svg>
                Join Telegram
            </a>

            <button class="btn btn-continue" id="continueBtn" onclick="goToDashboard()">
                Continue to Dashboard
            </button>
        </div>

        <div class="skip-link">
            <a href="#" onclick="skipTelegram()">Skip for now</a>
        </div>

        <div class="steps-container">
            <div class="steps">
                <div class="step-dot"></div>
                <div class="step-dot"></div>
                <div class="step-dot active"></div>
            </div>
            <div class="step-label">Step 3 of 3</div>
        </div>
    </div>

    <script>
        // Check if already joined
        const userData = JSON.parse(localStorage.getItem('bankWalletUser') || '{}');

        if (userData.telegramJoined) {
            document.getElementById('continueBtn').classList.add('show');
        }

        function joinedTelegram() {
            // Save to localStorage
            const data = JSON.parse(localStorage.getItem('bankWalletUser') || '{}');
            data.telegramJoined = true;
            data.telegramJoinedAt = new Date().toISOString();
            localStorage.setItem('bankWalletUser', JSON.stringify(data));

            // Show continue button immediately (no alert)
            document.getElementById('continueBtn').classList.add('show');
        }

        function goToDashboard() {
            const data = JSON.parse(localStorage.getItem('bankWalletUser') || '{}');

            if (!data.telegramJoined) {
                alert('Please click "Join Telegram" first!');
                return;
            }

            window.location.href = 'dashboard2.html';
        }

        function skipTelegram() {
            if (confirm('Joining our Telegram gives you exclusive bonuses. Skip?')) {
                window.location.href = 'dashboard2.html';
            }
        }
    </script>
</body>
</html>
