<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Wallet - Loading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #ffffff 0%, #f0fdf4 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes typing {
            0%, 100% { width: 0; }
            50% { width: 3ch; }
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        /* Spinner - single circle around logo */
        .spinner-wrapper {
            margin-bottom: 40px;
            position: relative;
            width: 100px;
            height: 100px;
            margin-left: auto;
            margin-right: auto;
        }

        .spinner {
            width: 100px;
            height: 100px;
            border: 4px solid transparent;
            border-top: 4px solid #16a34a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Icon in center */
        .spinner-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(22, 163, 74, 0.3);
        }

        .spinner-icon svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        /* Loading text */
        .loading-text {
            font-size: 22px;
            font-weight: 600;
            color: #16a34a;
            margin-bottom: 12px;
            animation: fadeInUp 0.5s ease-out;
        }

        .dots {
            display: inline-block;
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* Progress bar */
        .progress-wrapper {
            margin-bottom: 32px;
            animation: fadeInUp 0.5s ease-out 0.2s both;
        }

        .progress-bar-bg {
            width: 100%;
            max-width: 280px;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            margin: 0 auto 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #16a34a 0%, #22c55e 100%);
            border-radius: 4px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .progress-percent {
            font-size: 14px;
            font-weight: 600;
            color: #16a34a;
        }

        /* Fun facts */
        .fact-box {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 14px;
            padding: 16px 20px;
            max-width: 320px;
            margin: 0 auto;
            animation: fadeInUp 0.5s ease-out 0.3s both;
        }

        .fact-label {
            font-size: 11px;
            font-weight: 700;
            color: #16a34a;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .fact-text {
            font-size: 14px;
            color: #374151;
            line-height: 1.5;
            min-height: 42px;
        }

        /* User welcome */
        .user-welcome {
            margin-top: 24px;
            font-size: 15px;
            color: #6b7280;
            animation: fadeInUp 0.5s ease-out 0.4s both;
        }

        .user-welcome strong {
            color: #111827;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Spinner -->
        <div class="spinner-wrapper">
            <div class="spinner"></div>
            <div class="spinner-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7v2h20V7L12 2zm0 2.5L18.5 7H5.5L12 4.5zM4 10v10h3V10H4zm6 0v10h3V10h-3zm6 0v10h3V10h-3zM2 22v2h20v-2H2z"/>
                </svg>
            </div>
        </div>

        <!-- Loading Text -->
        <div class="loading-text">
            Starting mining<span class="dots">...</span>
        </div>

        <!-- Progress Bar -->
        <div class="progress-wrapper">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
            <div class="progress-percent" id="progressPercent">0%</div>
        </div>

        <!-- Fun Fact -->
        <div class="fact-box">
            <div class="fact-label">Did you know?</div>
            <div class="fact-text" id="factText">Bank Wallet users earn ₦86,000 daily on average!</div>
        </div>

        <!-- User Welcome -->
        <div class="user-welcome" id="userWelcome">
            Welcome back, <strong>User</strong>!
        </div>
    </div>

    <script>
        const facts = [
            "Bank Wallet users earn ₦86,000 daily on average!",
            "Your assets are secured with bank-grade encryption.",
            "Over 10,000+ users trust Bank Wallet daily.",
            "Mining rewards are distributed every 24 hours.",
            "Refer friends and earn 10% bonus on their earnings!",
            "Bank Wallet has processed ₦500M+ in transactions."
        ];

        let progress = 0;
        const duration = 6000; // 6 seconds
        const interval = 50; // update every 50ms
        const increment = 100 / (duration / interval);
        let factIndex = 0;

        // Get user name from localStorage
        const userData = JSON.parse(localStorage.getItem('bankWalletUser') || '{}');
        if (userData.accountName) {
            document.getElementById('userWelcome').innerHTML = 
                `Welcome back, <strong>${userData.accountName}</strong>!`;
        } else {
            document.getElementById('userWelcome').style.display = 'none';
        }

        // Progress bar
        const progressBar = document.getElementById('progressBar');
        const progressPercent = document.getElementById('progressPercent');
        const factText = document.getElementById('factText');

        const timer = setInterval(() => {
            progress += increment;

            if (progress >= 100) {
                progress = 100;
                clearInterval(timer);

                // After loading completes, redirect to signup.html
                setTimeout(() => {
                    window.location.href = 'signup.html';
                }, 300);
            }

            progressBar.style.width = progress + '%';
            progressPercent.textContent = Math.floor(progress) + '%';

            // Change fact every 20%
            const newFactIndex = Math.floor(progress / 20) % facts.length;
            if (newFactIndex !== factIndex) {
                factIndex = newFactIndex;
                factText.style.opacity = '0';
                setTimeout(() => {
                    factText.textContent = facts[factIndex];
                    factText.style.opacity = '1';
                }, 200);
            }
        }, interval);

        // Smooth fact transitions
        factText.style.transition = 'opacity 0.3s ease';
    </script>
</body>
</html>
